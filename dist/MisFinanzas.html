/* App */
/* ── Fuentes ─────────────────────────────────────────── */
/* build.js reemplaza estos @font-face con base64 */


/* ── Custom Properties — Tokyo Night Dark (default) ──── */
:root {
  /* Backgrounds */
  --bg:      #1e1f2e;
  --bg2:     #24283b;
  --bg3:     #292e42;
  --border:  #414868;

  /* Text */
  --text:    #c0caf5;
  --text2:   #a9b1d6;
  --text3:   #565f89;

  /* Accent colors */
  --blue:    #7aa2f7;
  --red:     #f7768e;
  --amber:   #ff9e64;
  --purple:  #bb9af7;
  --green:   #9ece6a;

  /* Semantic aliases */
  --accent:  var(--blue);
  --income:  var(--green);
  --expense: var(--red);
  --warning: var(--amber);

  /* Layout */
  --sidebar-width:       220px;
  --topbar-height:       56px;
  --bottom-tabs-height:  64px;
  --fab-size:            52px;

  /* Misc */
  --radius:   10px;
  --radius-sm: 6px;
  --shadow:   0 4px 16px rgba(0, 0, 0, 0.35);
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
  --transition: 0.2s ease;
}

/* ── Responsive layout tokens (Tailwind-scale) ───────── */
/* lg — 1024px */
@media (min-width: 1024px) {
  :root {
    --sidebar-width:  240px;
    --radius:         12px;
    --radius-sm:       7px;
  }
}

/* xl — 1280px */
@media (min-width: 1280px) {
  :root {
    --sidebar-width:  260px;
    --topbar-height:   60px;
    --radius-sm:       8px;
  }
}

/* 2xl — 1536px */
@media (min-width: 1536px) {
  :root {
    --sidebar-width:  280px;
    --topbar-height:   64px;
  }
}

/* ── Reset ───────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

/* ── Tipografía ──────────────────────────────────────── */
h1, h2, h3, h4 { font-weight: 600; color: var(--text); }
h1 { font-size: 22px; }
h2 { font-size: 18px; }
h3 { font-size: 15px; }
h4 { font-size: 13px; }

.mono {
  font-family: 'DM Mono', 'Fira Mono', monospace;
  font-size: 13px;
}

.amount {
  font-family: 'DM Mono', monospace;
  font-weight: 500;
}

.amount--income { color: var(--income); }
.amount--expense { color: var(--expense); }

/* ── Utilities ───────────────────────────────────────── */
.text-muted   { color: var(--text3); }
.text-accent  { color: var(--accent); }
.text-income  { color: var(--income); }
.text-expense { color: var(--expense); }
.text-warning { color: var(--warning); }

.truncate {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  clip: rect(0, 0, 0, 0);
  overflow: hidden;
}

/* ── Tokyo Night Light ───────────────────────────────── */
[data-theme="light"] {
  --bg:      #f5f5ff;
  --bg2:     #ffffff;
  --bg3:     #f0f0f8;
  --border:  #d5d8f0;

  --text:    #343b58;
  --text2:   #565f89;
  --text3:   #8c8fa8;

  --blue:    #3d59a1;
  --red:     #8c4351;
  --amber:   #965027;
  --purple:  #7847bd;
  --green:   #485e30;

  --shadow:    0 4px 16px rgba(0, 0, 0, 0.10);
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.07);
}

#btn-theme-toggle {
  transition: transform var(--transition);
}
#btn-theme-toggle:hover {
  transform: rotate(20deg);
}

/* ── Topbar ──────────────────────────────────────────── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-height);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 100;
  gap: 8px;
}

/* lg */ @media (min-width: 1024px) { .topbar { padding: 0 28px; } }
/* xl */ @media (min-width: 1280px) { .topbar { padding: 0 40px; } }
/* 2xl*/ @media (min-width: 1536px) { .topbar { padding: 0 56px; } }

.topbar-title {
  font-size: 16px;
  font-weight: 600;
  flex: 1;
}

/* lg */ @media (min-width: 1024px) { .topbar-title { font-size: 17px; } }
/* xl */ @media (min-width: 1280px) { .topbar-title { font-size: 18px; } }

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}
/* lg */ @media (min-width: 1024px) { .topbar-actions { gap: 6px; } }

/* ── Sidebar (desktop) ───────────────────────────────── */
.sidebar {
  display: none;
}

/* md — sidebar appears */
@media (min-width: 768px) {
  .sidebar {
    display: flex;
    flex-direction: column;
    position: fixed;
    top: var(--topbar-height);
    left: 0;
    bottom: 0;
    width: var(--sidebar-width);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    z-index: 90;
    padding: 8px 0;
  }
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

.sidebar-logo-icon { font-size: 22px; }
.sidebar-logo-text { font-size: 15px; font-weight: 600; }

/* lg */ @media (min-width: 1024px) {
  .sidebar-logo { padding: 16px 20px 20px; gap: 12px; }
  .sidebar-logo-icon { font-size: 24px; }
  .sidebar-logo-text { font-size: 16px; }
}
/* xl */ @media (min-width: 1280px) {
  .sidebar-logo { padding: 18px 24px 22px; }
  .sidebar-logo-text { font-size: 17px; }
}

.sidebar-nav {
  list-style: none;
  padding: 0 8px;
}

.sidebar-nav li { margin: 2px 0; }

/* lg */ @media (min-width: 1024px) { .sidebar-nav { padding: 0 12px; } }
/* xl */ @media (min-width: 1280px) { .sidebar-nav { padding: 0 16px; } }

/* ── Nav items (compartido: sidebar + drawer) ─────────── */
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 10px;
  background: none;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text2);
  font-size: 14px;
  text-align: left;
  transition: background var(--transition), color var(--transition);
}

.nav-item:hover {
  background: var(--bg3);
  color: var(--text);
}

.nav-item.active {
  background: var(--bg3);
  color: var(--accent);
  font-weight: 500;
}

.nav-icon { font-size: 17px; min-width: 22px; text-align: center; }
.nav-label { flex: 1; }

/* lg */ @media (min-width: 1024px) {
  .nav-item { padding: 10px 14px; gap: 12px; font-size: 14px; }
  .nav-icon  { font-size: 18px; min-width: 24px; }
}
/* xl */ @media (min-width: 1280px) {
  .nav-item { padding: 11px 16px; font-size: 15px; }
  .nav-icon  { font-size: 19px; min-width: 26px; }
}

/* ── Main content area ───────────────────────────────── */
.main-content {
  position: fixed;
  top: var(--topbar-height);
  left: 0;
  right: 0;
  bottom: var(--bottom-tabs-height);
  overflow-y: auto;
  padding: 16px;
  scroll-behavior: smooth;
}

/* sm  — 640px  */ @media (min-width:  640px) { .main-content { padding: 20px;        } }
/* md  — 768px  */ @media (min-width:  768px) { .main-content { left: var(--sidebar-width); bottom: 0; padding: 20px 24px; } }
/* lg  — 1024px */ @media (min-width: 1024px) { .main-content { padding: 24px 32px;    } }
/* xl  — 1280px */ @media (min-width: 1280px) { .main-content { padding: 28px 40px;    } }
/* 2xl — 1536px */ @media (min-width: 1536px) { .main-content { padding: 32px 56px;    } }

/* ── Views ───────────────────────────────────────────── */
.view { display: none; }
.view.active { display: block; }

.view-title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 16px;
}

/* lg */ @media (min-width: 1024px) { .view-title { font-size: 22px; margin-bottom: 20px; } }
/* xl */ @media (min-width: 1280px) { .view-title { font-size: 24px; margin-bottom: 24px; } }

/* ── Bottom tabs (mobile) ────────────────────────────── */
.bottom-tabs {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--bottom-tabs-height);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}

@media (min-width: 768px) {
  .bottom-tabs { display: none; }
}

.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text3);
  font-size: 11px;
  padding: 6px 0 8px;
  transition: color var(--transition);
}

.tab.active { color: var(--accent); }
.tab-icon { font-size: 20px; line-height: 1; }
.tab-label { font-size: 10px; }

/* ── FAB (mobile) ────────────────────────────────────── */
.fab {
  position: fixed;
  bottom: calc(var(--bottom-tabs-height) + 16px);
  right: 16px;
  width: var(--fab-size);
  height: var(--fab-size);
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 26px;
  font-weight: 300;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
  z-index: 95;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.fab.fab--hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.8);
}

@media (min-width: 768px) {
  .fab { display: none; }
}

#btn-add-topbar {
  display: none;
}

/* ── "Más" Drawer (mobile) ───────────────────────────── */
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 190;
}

.drawer-overlay.active { display: block; }

.drawer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 80vh;
  overflow-y: auto;
}

.drawer.active { transform: translateY(0); }

.drawer-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 4px auto 12px;
}

.drawer-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text3);
  padding: 0 10px 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.drawer-nav { list-style: none; }
.drawer-nav li { margin: 2px 0; }

/* ── Reminder banner ─────────────────────────────────── */
.reminder-banner {
  display: none;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--text2);
}

.reminder-banner.active {
  display: flex;
}

/* ── Buttons ─────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--transition), opacity var(--transition);
  white-space: nowrap;
}

.btn:hover { background: var(--border); }
.btn:active { opacity: 0.8; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-primary:hover { filter: brightness(1.1); }

.btn-danger {
  background: transparent;
  border-color: var(--red);
  color: var(--red);
}
.btn-danger:hover { background: var(--red); color: #fff; }

.btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text2);
}
.btn-ghost:hover { background: var(--bg3); }

.btn-icon {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}
.btn-icon:hover { background: var(--bg3); }

.btn-link {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--accent);
  font-size: 13px;
  font-family: inherit;
  padding: 0;
  text-decoration: underline;
}

/* ── Cards ───────────────────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: border-color var(--transition);
}

.card:hover { border-color: var(--text3); }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.card-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.card-value {
  font-family: 'DM Mono', monospace;
  font-size: 24px;
  font-weight: 500;
  color: var(--text);
}

/* lg */ @media (min-width: 1024px) { .card-value { font-size: 26px; } }
/* xl */ @media (min-width: 1280px) { .card-value { font-size: 28px; } }

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

/* lg */ @media (min-width: 1024px) { .card-grid { gap: 16px; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }
/* xl */ @media (min-width: 1280px) { .card-grid { gap: 20px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }

/* ── Modal ───────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 290;
  backdrop-filter: blur(2px);
}

.modal-overlay.active { display: block; }

.modal {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  z-index: 300;
  width: min(480px, calc(100vw - 32px));
  max-height: calc(100vh - 64px);
  overflow-y: auto;
}

.modal.active { display: flex; flex-direction: column; }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 0;
  position: sticky;
  top: 0;
  background: var(--bg2);
  z-index: 1;
}

.modal-header h3 { font-size: 16px; }

.modal-body { padding: 16px; }

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 0 16px 16px;
}

/* ── Forms ───────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.form-input,
.form-select,
.form-textarea {
  width: 100%;
  padding: 9px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition);
}

.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  border-color: var(--accent);
}

.form-textarea { resize: vertical; min-height: 72px; }

.form-input[type="date"] { color-scheme: dark; }
[data-theme="light"] .form-input[type="date"] { color-scheme: light; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ── Pills / Tags ────────────────────────────────────── */
.pill {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  background: var(--bg3);
  color: var(--text2);
}

.pill--income { background: color-mix(in srgb, var(--income) 15%, transparent); color: var(--income); }
.pill--expense { background: color-mix(in srgb, var(--expense) 15%, transparent); color: var(--expense); }
.pill--accent { background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent); }

/* ── Progress bar ────────────────────────────────────── */
.progress-bar {
  height: 6px;
  background: var(--bg3);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-bar__fill {
  height: 100%;
  border-radius: 999px;
  background: var(--accent);
  transition: width 0.4s ease;
}

.progress-bar__fill--warning { background: var(--warning); }
.progress-bar__fill--danger  { background: var(--expense); }
.progress-bar__fill--success { background: var(--income); }

/* ── Toast notifications ─────────────────────────────── */
.toast-container {
  position: fixed;
  top: calc(var(--topbar-height) + 8px);
  right: 16px;
  z-index: 400;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  max-width: 300px;
  box-shadow: var(--shadow-sm);
  opacity: 0;
  transform: translateX(16px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  pointer-events: auto;
}

.toast.toast--visible {
  opacity: 1;
  transform: translateX(0);
}

.toast--success { border-left: 3px solid var(--income); }
.toast--error   { border-left: 3px solid var(--expense); }
.toast--info    { border-left: 3px solid var(--accent); }

/* ── Section header ──────────────────────────────────── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

/* lg */ @media (min-width: 1024px) { .section-header { margin-bottom: 20px; } }
/* xl */ @media (min-width: 1280px) { .section-header { margin-bottom: 24px; } }

/* ── Empty state ─────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  text-align: center;
  color: var(--text3);
  gap: 8px;
}

.empty-state__icon { font-size: 40px; }
.empty-state__text { font-size: 14px; }

/* ── List items ──────────────────────────────────────── */
.list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  transition: border-color var(--transition);
}

.list-item:hover { border-color: var(--text3); }

.list-item__icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  background: var(--bg3);
}

.list-item__content { flex: 1; min-width: 0; }
.list-item__title   { font-size: 14px; font-weight: 500; }
.list-item__sub     { font-size: 12px; color: var(--text3); margin-top: 1px; }

.list-item__amount {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  text-align: right;
}

.list-item__actions {
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity var(--transition);
}

.list-item:hover .list-item__actions { opacity: 1; }

/* ── Search bar ──────────────────────────────────────── */
.search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  margin-bottom: 16px;
}

.search-bar input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
}

.search-bar input::placeholder { color: var(--text3); }

/* ── Dashboard metric row ────────────────────────────── */
/* Always 4 cards side-by-side from sm upward; smaller min prevents wrapping */
.dash-metric-grid {
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  margin-bottom: 16px;
}

/* sm  */ @media (min-width:  480px) { .dash-metric-grid { gap: 12px; } }
/* lg  */ @media (min-width: 1024px) { .dash-metric-grid { gap: 16px; grid-template-columns: repeat(4, 1fr); } }
/* xl  */ @media (min-width: 1280px) { .dash-metric-grid { gap: 20px; margin-bottom: 20px; } }
/* 2xl */ @media (min-width: 1536px) { .dash-metric-grid { gap: 24px; margin-bottom: 24px; } }

/* ── Dashboard layout ────────────────────────────────── */
.dash-container {
  max-width: 1200px;
}

/* 2xl: give dashboard a bit more room */
@media (min-width: 1536px) { .dash-container { max-width: 1440px; } }

.dash-charts-grid {
  display: grid;
  grid-template-columns: 1fr;        /* xs: stack */
  gap: 12px;
  margin-bottom: 16px;
}

/* sm (480px): health + donut side by side; net worth spans */
@media (min-width: 480px) {
  .dash-charts-grid               { grid-template-columns: 1fr 1fr; gap: 14px; }
  .dash-networth-card             { grid-column: 1 / -1; }
}

/* lg (1024px): all three in one row */
@media (min-width: 1024px) {
  .dash-charts-grid               { grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .dash-networth-card             { grid-column: auto; }
}

/* xl (1280px) */
@media (min-width: 1280px) {
  .dash-charts-grid               { gap: 24px; margin-bottom: 24px; }
}

/* 2xl (1536px) */
@media (min-width: 1536px) {
  .dash-charts-grid               { gap: 28px; }
}

/* ── Health Score widget ─────────────────────────────── */
.health-score {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.health-score__number {
  font-size: 48px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
}

/* lg */ @media (min-width: 1024px) { .health-score__number { font-size: 52px; } }
/* xl */ @media (min-width: 1280px) { .health-score__number { font-size: 58px; } }

.health-score__label {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}

.health-score__bar {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 12px;
}

.health-score__bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text2);
}

.health-score__bar-label {
  width: 90px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.health-score__message {
  font-size: 13px;
  color: var(--text2);
  font-style: italic;
}

/* ── Color dot ───────────────────────────────────────── */
.color-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Toggle switch ───────────────────────────────────── */
.toggle {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 22px;
}

.toggle input { opacity: 0; width: 0; height: 0; }

.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
  transition: background var(--transition);
}

.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 2px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--text3);
  border-radius: 50%;
  transition: transform var(--transition), background var(--transition);
}

.toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
.toggle input:checked + .toggle-slider::before {
  transform: translate(18px, -50%);
  background: #fff;
}

/* ── Danger zone ─────────────────────────────────────── */
.danger-zone {
  background: color-mix(in srgb, var(--red) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--red) 30%, transparent);
  border-radius: var(--radius);
  padding: 16px;
}

(function(){
// src/modules/db.js
// Capa de acceso a datos: localStorage, migraciones, UUIDs, demo data.

const _STORAGE_V2 = 'misfinanzas_v2';
const _STORAGE_V1 = 'misfinanzas_v1'; // clave legacy del app v1
const _CURRENT_VERSION = 2;

// ── UUID ───────────────────────────────────────────────────────────────────

function generateId() {
  if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
    return crypto.randomUUID();
  }
  // Polyfill para iOS Safari < 15.4
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ── DB vacía ───────────────────────────────────────────────────────────────

function emptyDB() {
  return {
    _meta: {
      version: _CURRENT_VERSION,
      deviceId: generateId(),
      exportedAt: null,
      appVersion: '2.0.0'
    },
    accounts:     [],
    cards:        [],
    transactions: [],
    budgets:      [],
    goals:        [],
    debts:        [],
    recurring:    [],
    transfers:    [],
    installments: [],
    categories:   [],
    settings: {
      theme: 'dark',
      currency: '$',
      reminderEnabled: false,
      reminderTime: '20:00',
      budgetRollover: false
    }
  };
}

// ── Migración v1 → v2 ──────────────────────────────────────────────────────

function migrateV1toV2(db) {
  const now = new Date().toISOString();
  const idMap = {};

  function ensureUUID(oldId) {
    if (!oldId) return generateId();
    if (oldId.length >= 32) return oldId;
    if (!idMap[oldId]) idMap[oldId] = generateId();
    return idMap[oldId];
  }

  function resolveRef(oldId) {
    if (!oldId) return '';
    return idMap[oldId] || oldId;
  }

  const accounts = (db.accounts || []).map(a => ({
    ...a,
    id: ensureUUID(a.id),
    createdAt: a.createdAt || now,
    updatedAt: a.updatedAt || now
  }));

  const cards = (db.cards || []).map(c => ({
    ...c,
    id: ensureUUID(c.id),
    createdAt: c.createdAt || now,
    updatedAt: c.updatedAt || now
  }));

  const budgets = (db.budgets || []).map(b => ({
    ...b,
    id: ensureUUID(b.id),
    rollover: b.rollover ?? 0,
    createdAt: b.createdAt || now,
    updatedAt: b.updatedAt || now
  }));

  const goals = (db.goals || []).map(g => ({
    ...g,
    id: ensureUUID(g.id),
    createdAt: g.createdAt || now,
    updatedAt: g.updatedAt || now
  }));

  const debts = (db.debts || []).map(d => ({
    ...d,
    id: ensureUUID(d.id),
    createdAt: d.createdAt || now,
    updatedAt: d.updatedAt || now
  }));

  const recurring = (db.recurring || []).map(r => ({
    ...r,
    id: ensureUUID(r.id),
    createdAt: r.createdAt || now,
    updatedAt: r.updatedAt || now
  }));

  const installments = (db.installments || []).map(i => ({
    ...i,
    id: ensureUUID(i.id),
    createdAt: i.createdAt || now,
    updatedAt: i.updatedAt || now
  }));

  const transactions = (db.transactions || []).map(t => ({
    ...t,
    id: ensureUUID(t.id),
    account: resolveRef(t.account),
    note: t.note || '',
    createdAt: t.createdAt || now,
    updatedAt: t.updatedAt || now
  }));

  const transfers = (db.transfers || []).map(t => ({
    ...t,
    id: ensureUUID(t.id),
    from: resolveRef(t.from),
    to: resolveRef(t.to),
    note: t.note || '',
    createdAt: t.createdAt || now
  }));

  return {
    _meta: {
      version: 2,
      deviceId: generateId(),
      exportedAt: null,
      appVersion: '2.0.0'
    },
    accounts, cards, transactions, budgets,
    goals, debts, recurring, transfers, installments,
    categories: [],
    settings: {
      theme: db.settings?.theme || 'dark',
      currency: db.settings?.currency || '$',
      reminderEnabled: false,
      reminderTime: '20:00',
      budgetRollover: false
    }
  };
}

const _MIGRATIONS = {
  1: migrateV1toV2
};

// ── loadData ───────────────────────────────────────────────────────────────

function loadData() {
  try {
    let raw = localStorage.getItem(_STORAGE_V2);

    if (!raw) {
      const v1raw = localStorage.getItem(_STORAGE_V1);
      if (v1raw) {
        const v1db = JSON.parse(v1raw);
        const v2db = migrateV1toV2(v1db);
        saveData(v2db);
        return v2db;
      }
      return emptyDB();
    }

    let db = JSON.parse(raw);
    let version = db._meta?.version ?? 1;

    while (version < _CURRENT_VERSION) {
      if (!_MIGRATIONS[version]) break;
      db = _MIGRATIONS[version](db);
      version++;
    }

    return db;
  } catch (_) {
    return emptyDB();
  }
}

// ── saveData ───────────────────────────────────────────────────────────────

function saveData(db) {
  try {
    localStorage.setItem(_STORAGE_V2, JSON.stringify(db));
  } catch (e) {
    if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
      throw new Error('Storage full: unable to save data. Free up space and try again.');
    }
    throw e;
  }
}

// ── clearData ──────────────────────────────────────────────────────────────

function clearData() {
  localStorage.removeItem(_STORAGE_V2);
  localStorage.removeItem(_STORAGE_V1);
}

// ── storageUsedKB ──────────────────────────────────────────────────────────

function storageUsedKB() {
  const raw = localStorage.getItem(_STORAGE_V2) || '';
  return (raw.length / 1024).toFixed(1);
}

(function(){
// src/modules/sync.js
// Export JSON/CSV e import incremental con preview y merge sin duplicados.

function _getDB() {
  if (typeof window !== 'undefined' && window.MF && window.MF.db) {
    return window.MF.db.loadData();
  }
  return {};
}

function _saveDB(db) {
  if (typeof window !== 'undefined' && window.MF && window.MF.db) {
    window.MF.db.saveData(db);
  }
}

function _triggerDownload(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function _isoDate(d) {
  return new Date(d).toISOString().slice(0, 10);
}

function exportJSON() {
  const db = _getDB();
  db._meta.exportedAt = new Date().toISOString();
  const filename = `misfinanzas_backup_${_isoDate(new Date())}.json`;
  _triggerDownload(filename, JSON.stringify(db, null, 2), 'application/json');
}

function exportCSV() {
  const db = _getDB();
  const rows = [['fecha', 'descripcion', 'categoria', 'monto', 'cuenta', 'tipo', 'nota']];

  const accountNames = {};
  for (const a of (db.accounts || [])) accountNames[a.id] = a.name;

  for (const tx of (db.transactions || [])) {
    rows.push([
      tx.date,
      `"${(tx.desc || '').replace(/"/g, '""')}"`,
      tx.cat || '',
      tx.amount,
      accountNames[tx.account] || tx.account || '',
      tx.type,
      `"${(tx.note || '').replace(/"/g, '""')}"`
    ].join(','));
  }

  const filename = `misfinanzas_transacciones_${_isoDate(new Date())}.csv`;
  _triggerDownload(filename, rows[0].join(',') + '\n' + rows.slice(1).join('\n'), 'text/csv;charset=utf-8');
}

// ── mergeCollection ────────────────────────────────────────────────────────

function mergeCollection(local, incoming) {
  const result    = [...local];
  const localMap  = new Map(local.map(item => [item.id, item]));
  const resultMap = new Map(local.map((item, i) => [item.id, i]));

  for (const item of incoming) {
    if (!localMap.has(item.id)) {
      result.push(item);
    } else {
      const localItem  = localMap.get(item.id);
      const localMs    = new Date(localItem.updatedAt || localItem.createdAt || 0).getTime();
      const incomingMs = new Date(item.updatedAt     || item.createdAt     || 0).getTime();

      if (incomingMs > localMs) {
        const idx = resultMap.get(item.id);
        if (idx !== undefined) result[idx] = item;
      }
    }
  }

  return result;
}

const _COLLECTIONS = [
  'accounts', 'cards', 'transactions', 'budgets',
  'goals', 'debts', 'recurring', 'transfers',
  'installments', 'categories'
];

function mergeDB(local, incoming) {
  const merged = { ...local };
  for (const col of _COLLECTIONS) {
    merged[col] = mergeCollection(local[col] || [], incoming[col] || []);
  }
  return merged;
}

function calcMergePreview(local, incoming) {
  let newRecords = 0;
  let unchanged  = 0;
  let conflicts  = 0;
  let localWins  = 0;

  for (const col of _COLLECTIONS) {
    const localMap = new Map((local[col] || []).map(i => [i.id, i]));

    for (const item of (incoming[col] || [])) {
      if (!localMap.has(item.id)) {
        newRecords++;
      } else {
        const localItem  = localMap.get(item.id);
        const localMs    = new Date(localItem.updatedAt || localItem.createdAt || 0).getTime();
        const incomingMs = new Date(item.updatedAt     || item.createdAt     || 0).getTime();
        const diff       = Math.abs(localMs - incomingMs);

        if (diff < 1000) {
          unchanged++;
        } else if (incomingMs > localMs) {
          conflicts++;
        } else {
          localWins++;
        }
      }
    }
  }

  const incomingMeta = incoming._meta || {};
  return {
    newRecords,
    unchanged,
    conflicts,
    localWins,
    deviceId:   incomingMeta.deviceId || 'desconocido',
    exportedAt: incomingMeta.exportedAt
      ? new Date(incomingMeta.exportedAt).toLocaleDateString('es', { day: 'numeric', month: 'short', year: 'numeric' })
      : 'desconocido'
  };
}

function importIncremental() {
  const input = document.createElement('input');
  input.type   = 'file';
  input.accept = '.json,application/json';

  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;

    let incoming;
    try {
      incoming = JSON.parse(await file.text());
    } catch (_) {
      window.MF.nav.toast('Archivo JSON inválido', 'error');
      return;
    }

    if (!incoming._meta) {
      window.MF.nav.toast('El archivo no parece ser un backup de MisFinanzas', 'error');
      return;
    }

    const local   = _getDB();
    const preview = calcMergePreview(local, incoming);

    const html = `
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div style="font-size:13px;color:var(--text2)">
          Dispositivo origen: <strong style="color:var(--text)">${preview.exportedAt}</strong>
        </div>
        <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:12px;display:flex;flex-direction:column;gap:6px;">
          ${preview.newRecords > 0 ? `<div style="color:var(--income);display:flex;align-items:center;gap:4px">${window.MF.icons.check} ${preview.newRecords} registro${preview.newRecords !== 1 ? 's' : ''} nuevo${preview.newRecords !== 1 ? 's' : ''}</div>` : ''}
          ${preview.unchanged   > 0 ? `<div style="color:var(--text3)">${preview.unchanged} sin cambios (se omiten)</div>` : ''}
          ${preview.conflicts   > 0 ? `<div style="color:var(--warning);display:flex;align-items:center;gap:4px">${window.MF.icons.warning} ${preview.conflicts} conflicto${preview.conflicts !== 1 ? 's' : ''} \u2192 gana el m\u00e1s reciente</div>` : ''}
          ${preview.localWins   > 0 ? `<div style="color:var(--text3)">${preview.localWins} registro${preview.localWins !== 1 ? 's' : ''} local m\u00e1s reciente (se mantiene)</div>` : ''}
          ${preview.newRecords === 0 && preview.conflicts === 0 ? `<div style="color:var(--text3)">No hay cambios nuevos para importar.</div>` : ''}
        </div>
        <p style="font-size:12px;color:var(--text3)">Los datos locales nunca se borran al importar.</p>
      </div>
    `;

    window.MF.nav.showModal(html, 'Importar datos', [
      {
        label: 'Cancelar',
        action: () => window.MF.nav.closeModal()
      },
      {
        label: 'Importar y mezclar',
        primary: true,
        action: () => {
          const merged = mergeDB(local, incoming);
          _saveDB(merged);
          window.MF.nav.closeModal();
          window.MF.nav.toast(`Importado: ${preview.newRecords} nuevos, ${preview.conflicts} actualizados`, 'success');
          window.MF.nav.refresh();
        }
      }
    ]);
  };

  input.click();
}

const _syncAPI = {
  exportJSON,
  exportCSV,
  mergeDB,
  mergeCollection,
  calcMergePreview,
  importIncremental
};

if (typeof window !== 'undefined') {
  window.MF = window.MF || {};
  window.MF.sync = _syncAPI;
}

(function(){
// src/modules/analytics.js
// Cálculos de análisis financiero: health score, tendencias, proyecciones.

function calcHealthScore(db) {
  const now   = new Date();
  const month = now.toISOString().slice(0, 7);

  const monthTxs  = (db.transactions || []).filter(t => t.date && t.date.startsWith(month));
  const income    = monthTxs.filter(t => t.type === 'income').reduce((s, t) => s + (t.amount || 0), 0);
  const expenses  = monthTxs.filter(t => t.type === 'expense').reduce((s, t) => s + (t.amount || 0), 0);

  const savingsRate  = income > 0 ? Math.max(0, (income - expenses) / income) : 0;
  const savingsScore = Math.min(savingsRate * 2, 1) * 30;

  let budgetsScore = 25;
  if ((db.budgets || []).length > 0) {
    const ok = db.budgets.filter(b => {
      const spent = monthTxs
        .filter(t => t.cat === b.cat && t.type === 'expense')
        .reduce((s, t) => s + (t.amount || 0), 0);
      return spent <= (b.limit || 0) + (b.rollover || 0);
    }).length;
    budgetsScore = (ok / db.budgets.length) * 25;
  }

  let goalsScore = 25;
  if ((db.goals || []).length > 0) {
    const avgProgress = db.goals.reduce((s, g) => {
      return s + Math.min((g.saved || 0) / Math.max(g.target || 1, 1), 1);
    }, 0) / db.goals.length;
    goalsScore = avgProgress * 25;
  }

  let cardScore = 20;
  if ((db.cards || []).length > 0) {
    const avgUtil = db.cards.reduce((s, c) => {
      return s + (c.balance || 0) / Math.max(c.limit || 1, 1);
    }, 0) / db.cards.length;
    cardScore = Math.max(0, 1 - avgUtil) * 20;
  }

  const total = Math.round(savingsScore + budgetsScore + goalsScore + cardScore);

  return {
    total: Math.min(100, Math.max(0, total)),
    breakdown: {
      savings: Math.round(savingsScore),
      budgets: Math.round(budgetsScore),
      goals:   Math.round(goalsScore),
      cards:   Math.round(cardScore)
    }
  };
}

function healthScoreMessage(score) {
  if (score >= 85) return 'Excelentes finanzas — sigue así.';
  if (score >= 70) return 'Buena salud financiera — hay espacio para mejorar.';
  if (score >= 50) return 'Finanzas moderadas — revisa tus presupuestos.';
  if (score >= 30) return 'Atención — algunos indicadores necesitan trabajo.';
  return 'Momento de actuar — revisa tus gastos y metas.';
}

function calcSpendingTrends(db, months) {
  months = months || 6;
  const result = [];
  const now    = new Date();

  for (let i = months - 1; i >= 0; i--) {
    const d     = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const month = d.toISOString().slice(0, 7);
    const label = d.toLocaleDateString('es', { month: 'short', year: '2-digit' });

    const txs        = (db.transactions || []).filter(t => t.date && t.date.startsWith(month) && t.type === 'expense');
    const byCategory = {};
    for (const tx of txs) {
      byCategory[tx.cat || 'Sin categoría'] = (byCategory[tx.cat || 'Sin categoría'] || 0) + (tx.amount || 0);
    }
    const total = txs.reduce((s, t) => s + (t.amount || 0), 0);

    result.push({ month, label, byCategory, total });
  }

  return result;
}

function calcNetWorthEvolution(db, months) {
  months = months || 6;
  const now = new Date();

  const currentAssets = (db.accounts || []).reduce((s, a) => s + (a.balance || 0), 0);
  const currentDebts  = (db.debts   || []).reduce((s, d) => s + (d.remaining || 0), 0)
                      + (db.cards   || []).reduce((s, c) => s + (c.balance   || 0), 0);

  let netWorth = currentAssets - currentDebts;
  const points = [];

  for (let i = 0; i < months; i++) {
    const d     = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const month = d.toISOString().slice(0, 7);
    const label = d.toLocaleDateString('es', { month: 'short', year: '2-digit' });

    const txs     = (db.transactions || []).filter(t => t.date && t.date.startsWith(month));
    const income  = txs.filter(t => t.type === 'income').reduce((s, t)  => s + (t.amount || 0), 0);
    const expense = txs.filter(t => t.type === 'expense').reduce((s, t) => s + (t.amount || 0), 0);

    points.unshift({ month, label, netWorth: Math.round(netWorth) });

    netWorth = netWorth - income + expense;
  }

  return points;
}

function projectGoal(goal, monthlySavings) {
  const remaining = (goal.target || 0) - (goal.saved || 0);
  if (remaining <= 0) return 0;
  if (monthlySavings <= 0) return null;
  return Math.ceil(remaining / monthlySavings);
}

function projectDebt(debt) {
  const remaining = debt.remaining || 0;
  const monthly   = debt.monthly   || 0;
  const rate      = debt.rate      || 0;

  if (remaining <= 0) return 0;
  if (monthly   <= 0) return null;

  if (rate > 0) {
    const r = rate / 100 / 12;
    const inner = 1 - (r * remaining / monthly);
    if (inner <= 0) return null;
    return Math.ceil(-Math.log(inner) / Math.log(1 + r));
  }

  return Math.ceil(remaining / monthly);
}

function calcMonthlyAvgSavings(db, months) {
  months = months || 3;
  const trends = calcSpendingTrends(db, months);

  const now      = new Date();
  const nowMonth = now.toISOString().slice(0, 7);

  let totalSavings = 0;
  let count        = 0;

  for (const point of trends) {
    if (point.month === nowMonth) continue;
    const txs    = (db.transactions || []).filter(t => t.date && t.date.startsWith(point.month));
    const income = txs.filter(t => t.type === 'income').reduce((s, t) => s + (t.amount || 0), 0);
    totalSavings += income - point.total;
    count++;
  }

  return count > 0 ? totalSavings / count : 0;
}

const _analyticsAPI = {
  calcHealthScore,
  healthScoreMessage,
  calcSpendingTrends,
  calcNetWorthEvolution,
  projectGoal,
  projectDebt,
  calcMonthlyAvgSavings
};

if (typeof window !== 'undefined') {
  window.MF = window.MF || {};
  window.MF.analytics = _analyticsAPI;
}

(function(){
// src/modules/pwa.js
// Registro del Service Worker y manejo del install prompt de PWA.

let _deferredInstallPrompt = null;

function init() {
  if (!('serviceWorker' in navigator)) return;

  navigator.serviceWorker.register('./sw.js', { scope: './' })
    .then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker?.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            window.MF?.nav?.toast('App actualizada. Recarga para ver los cambios.', 'info');
          }
        });
      });
    })
    .catch(err => {
      console.warn('[PWA] SW not registered:', err.message);
    });

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredInstallPrompt = e;
  });

  window.addEventListener('appinstalled', () => {
    _deferredInstallPrompt = null;
  });
}

function canInstall() {
  return _deferredInstallPrompt !== null;
}

function isInstalled() {
  return window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
}

async function triggerInstall() {
  if (!_deferredInstallPrompt) return null;
  _deferredInstallPrompt.prompt();
  const { outcome } = await _deferredInstallPrompt.userChoice;
  _deferredInstallPrompt = null;
  return outcome;
}

async function requestNotificationPermission() {
  if (!('Notification' in window)) return 'unsupported';
  if (Notification.permission === 'granted') return 'granted';
  return Notification.requestPermission();
}

function getNotificationPermission() {
  if (!('Notification' in window)) return 'unsupported';
  return Notification.permission;
}

// ── Exports ────────────────────────────────────────────────────────────────

const _pwaAPI = {
  init,
  canInstall,
  isInstalled,
  triggerInstall,
  requestNotificationPermission,
  getNotificationPermission
};

if (typeof window !== 'undefined') {
  window.MF = window.MF || {};
  window.MF.pwa = _pwaAPI;
}



})();
(function(){
// src/modules/nav.js
// Hub de navegación: router, tema, FAB, drawer, modal y toast.

// ── Constantes ─────────────────────────────────────────────────────────────

const _SECTION_LABELS = {
  dashboard:      'Dashboard',
  cuentas:        'Cuentas',
  gastos:         'Gastos',
  presupuestos:   'Presupuestos',
  metas:          'Metas',
  deudas:         'Deudas',
  transferencias: 'Transferencias',
  recurrentes:    'Recurrentes',
  reporte:        'Reporte',
  cuotas:         'Cuotas',
  categorias:     'Categorías',
  configuracion:  'Configuración',
  salario:        'Salario'
};

let _currentSection = 'dashboard';
let _fabAction      = null;

// ── Escape helper (XSS prevention) ────────────────────────────────────────
// TODOS los datos del usuario interpolados en HTML deben pasar por esc().

function esc(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Inicialización ─────────────────────────────────────────────────────────

function init() {
  _initTheme();
  _initRouter();
  _initFab();
  _initDrawer();
  _initModal();
  _checkReminderBanner();
  _applySystemNotificationOnLoad();
}

// ── Router (hash-based) ────────────────────────────────────────────────────

function _initRouter() {
  window.addEventListener('hashchange', () => {
    const section = location.hash.slice(1) || 'dashboard';
    _showSection(section);
    closeDrawer();
  });

  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-nav]');
    if (!btn) return;
    const section = btn.dataset.nav;
    if (section === 'mas') return;
    go(section);
  });

  document.getElementById('tab-mas')?.addEventListener('click', openDrawer);

  const initial = location.hash.slice(1) || 'dashboard';
  _showSection(initial);
}

function go(section) {
  if (!_SECTION_LABELS[section]) return;
  if (location.hash.slice(1) === section) {
    _showSection(section);
  } else {
    location.hash = '#' + section;
  }
}

function refresh() {
  _showSection(_currentSection);
}

function _showSection(section) {
  if (!_SECTION_LABELS[section]) section = 'dashboard';

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

  const viewEl = document.getElementById('view-' + section);
  if (viewEl) viewEl.classList.add('active');

  document.querySelectorAll('[data-nav]').forEach(el => {
    el.classList.toggle('active', el.dataset.nav === section);
  });

  const titleEl = document.getElementById('topbar-title');
  if (titleEl) titleEl.textContent = _SECTION_LABELS[section] || section;

  const main = document.getElementById('main-content');
  if (main) main.scrollTop = 0;

  _fabAction = null;

  window.MF[section]?.render?.();

  _currentSection = section;
}

// ── FAB ────────────────────────────────────────────────────────────────────

function _initFab() {
  const fab       = document.getElementById('fab');
  const btnTopbar = document.getElementById('btn-add-topbar');
  const main      = document.getElementById('main-content');
  let   atBottom  = false;

  // On desktop the FAB is CSS-hidden; btn-add-topbar is the primary add button.
  // On mobile, btn-add-topbar replaces the FAB only when the user scrolls to the
  // bottom (so the FAB doesn't overlap content). These two modes are handled
  // separately so that setFabAction() can immediately show/hide the topbar button
  // on desktop without waiting for a scroll event.

  function _syncDesktopBtn() {
    if (!btnTopbar || window.innerWidth < 768) return;
    btnTopbar.style.display = _fabAction ? 'flex' : 'none';
  }

  // Expose so setFabAction (defined below) can call it.
  _initFab._sync = _syncDesktopBtn;

  function updateFabState(isBottom) {
    if (isBottom === atBottom) return;
    atBottom = isBottom;
    // Only manage the mobile swap; desktop is handled by _syncDesktopBtn.
    if (window.innerWidth >= 768) return;

    if (isBottom) {
      fab?.classList.add('fab--hidden');
      if (btnTopbar) btnTopbar.style.display = _fabAction ? 'flex' : 'none';
    } else {
      fab?.classList.remove('fab--hidden');
      if (btnTopbar) btnTopbar.style.display = 'none';
    }
  }

  main?.addEventListener('scroll', () => {
    const nearBottom = main.scrollHeight - main.scrollTop <= main.clientHeight + 48;
    updateFabState(nearBottom);
  });

  // Re-sync when window is resized across the breakpoint.
  window.addEventListener('resize', _syncDesktopBtn);

  function handleAddClick() {
    if (_fabAction) {
      _fabAction();
    } else {
      document.getElementById('main-content')?.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  fab?.addEventListener('click', handleAddClick);
  btnTopbar?.addEventListener('click', handleAddClick);
}

function setFabAction(fn) {
  _fabAction = fn;
  // Immediately sync the topbar button on desktop (no scroll needed).
  if (typeof _initFab._sync === 'function') _initFab._sync();
}

// ── Drawer móvil ──────────────────────────────────────────────────────────

function _initDrawer() {
  document.getElementById('drawer-overlay')?.addEventListener('click', closeDrawer);
}

function openDrawer() {
  document.getElementById('drawer')?.classList.add('active');
  document.getElementById('drawer-overlay')?.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer')?.classList.remove('active');
  document.getElementById('drawer-overlay')?.classList.remove('active');
  document.body.style.overflow = '';
}

// ── Tema ───────────────────────────────────────────────────────────────────

function _initTheme() {
  let theme = 'dark';
  try {
    const db = window.MF?.db?.loadData?.();
    if (db?.settings?.theme) {
      theme = db.settings.theme;
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      theme = 'light';
    }
  } catch (_) {}

  _applyTheme(theme);
  document.getElementById('btn-theme-toggle')?.addEventListener('click', toggleTheme);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  _applyTheme(current === 'dark' ? 'light' : 'dark');
}

function _applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);

  // MF.icons values are trusted static SVG strings defined in icons.js (not user data)
  const btn = document.getElementById('btn-theme-toggle');
  if (btn) btn.innerHTML = theme === 'dark' ? MF.icons.sun : MF.icons.moon; // trusted static SVG

  const meta = document.getElementById('theme-color-meta');
  if (meta) meta.content = theme === 'dark' ? '#1e1f2e' : '#f5f5ff';

  try {
    const db = window.MF?.db?.loadData?.();
    if (db) {
      db.settings.theme = theme;
      window.MF.db.saveData(db);
    }
  } catch (_) {}
}

// ── Modal ──────────────────────────────────────────────────────────────────

function _initModal() {
  document.getElementById('modal-overlay')?.addEventListener('click', closeModal);
}

function showModal(trustedHTML, title, buttons) {
  const modal = document.getElementById('modal');
  if (!modal) return;

  const header = document.createElement('div');
  header.className = 'modal-header';

  const titleEl = document.createElement('h3');
  titleEl.id = 'modal-title';
  titleEl.textContent = title;
  header.appendChild(titleEl);

  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn-icon modal-close';
  closeBtn.setAttribute('aria-label', 'Cerrar');
  closeBtn.innerHTML = MF.icons.x; // trusted static SVG
  closeBtn.addEventListener('click', closeModal);
  header.appendChild(closeBtn);

  const body = document.createElement('div');
  body.className = 'modal-body';
  body.innerHTML = trustedHTML; // trustedHTML: caller must sanitize user data via esc()

  modal.innerHTML = '';
  modal.appendChild(header);
  modal.appendChild(body);

  if (buttons && buttons.length > 0) {
    const footer = document.createElement('div');
    footer.className = 'modal-footer';

    for (const btn of buttons) {
      const el = document.createElement('button');
      el.className = `btn ${btn.primary ? 'btn-primary' : btn.danger ? 'btn-danger' : 'btn-ghost'}`;
      el.textContent = btn.label;
      if (btn.action) el.addEventListener('click', btn.action);
      footer.appendChild(el);
    }

    modal.appendChild(footer);
  }

  document.getElementById('modal-overlay')?.classList.add('active');
  modal.classList.add('active');

  setTimeout(() => modal.querySelector('input, select, textarea')?.focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay')?.classList.remove('active');
  document.getElementById('modal')?.classList.remove('active');
}

// ── Toast ──────────────────────────────────────────────────────────────────

function toast(msg, type) {
  type = type || 'success';
  const container = document.getElementById('toast-container');
  if (!container) return;

  const el = document.createElement('div');
  el.className = 'toast toast--' + type;
  el.textContent = msg;
  container.appendChild(el);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => el.classList.add('toast--visible'));
  });

  setTimeout(() => {
    el.classList.remove('toast--visible');
    el.addEventListener('transitionend', () => el.remove(), { once: true });
  }, 3000);
}

// ── Reminder banner ────────────────────────────────────────────────────────

function _checkReminderBanner() {
  try {
    const db = window.MF?.db?.loadData?.();
    if (!db) return;
    const today = new Date().toISOString().slice(0, 10);
    const hasTx = db.transactions.some(t => t.date === today);
    if (!hasTx) {
      document.getElementById('reminder-banner')?.classList.add('active');
    }
  } catch (_) {}

  document.getElementById('banner-dismiss')?.addEventListener('click', () => {
    document.getElementById('reminder-banner')?.classList.remove('active');
  });
}

// ── Notificación del sistema ───────────────────────────────────────────────

function _applySystemNotificationOnLoad() {
  try {
    const db = window.MF?.db?.loadData?.();
    if (!db?.settings?.reminderEnabled) return;
    if (typeof Notification === 'undefined') return;
    if (Notification.permission !== 'granted') return;

    const today   = new Date().toISOString().slice(0, 10);
    const hasTx   = db.transactions.some(t => t.date === today);
    if (hasTx) return;

    const [h, m]  = (db.settings.reminderTime || '20:00').split(':').map(Number);
    const now     = new Date();
    const after   = now.getHours() > h || (now.getHours() === h && now.getMinutes() >= m);
    if (!after) return;

    const key = 'mf_notif_' + today;
    if (sessionStorage.getItem(key)) return;
    sessionStorage.setItem(key, '1');

    new Notification('MisFinanzas', {
      body: 'No has registrado movimientos hoy \uD83D\uDCA1',
      tag:  'mf-daily-reminder'
    });
  } catch (_) {}
}

// ── Helpers de UI reutilizables ────────────────────────────────────────────

function formatCurrency(amount, currency) {
  currency = currency || '$';
  return currency + ' ' + Number(amount || 0).toLocaleString('es', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function formatDate(isoDate) {
  if (!isoDate) return '';
  return new Date(isoDate + 'T12:00:00').toLocaleDateString('es', {
    day: 'numeric', month: 'short', year: 'numeric'
  });
}

function contrastColor(hexBg) {
  if (!hexBg || hexBg.length < 7) return '#c0caf5';
  const r = parseInt(hexBg.slice(1, 3), 16);
  const g = parseInt(hexBg.slice(3, 5), 16);
  const b = parseInt(hexBg.slice(5, 7), 16);
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return lum > 0.5 ? '#1e1f2e' : '#c0caf5';
}

// ── Exports ────────────────────────────────────────────────────────────────

const _navAPI = {
  init,
  go,
  refresh,
  toggleTheme,
  showModal,
  closeModal,
  toast,
  openDrawer,
  closeDrawer,
  setFabAction,
  formatCurrency,
  formatDate,
  contrastColor,
  esc,
  getCurrentSection: () => _currentSection
};

if (typeof window !== 'undefined') {
  window.MF = window.MF || {};
  window.MF.nav = _navAPI;
}

    + '<div class="section-header" style="margin-top:24px;margin-bottom:12px"><h2>Categor\u00edas personalizadas</h2></div>'
    + '<div id="cat-custom-list">' + customHTML + '</div>'
    + '</div>');

  document.getElementById('cat-defaults-list')?.addEventListener('click', function(e) {
    var btn = e.target.closest('button[data-action="toggle-default"]');
    if (!btn) return;
    var name = btn.dataset.name;
    var db2  = MF.db.loadData();
    db2.settings = db2.settings || {};
    db2.settings.hiddenCats = db2.settings.hiddenCats || [];
    var idx = db2.settings.hiddenCats.indexOf(name);
    if (idx >= 0) db2.settings.hiddenCats.splice(idx, 1);
    else db2.settings.hiddenCats.push(name);
    MF.db.saveData(db2);
    render();
  });

  document.getElementById('cat-custom-list')?.addEventListener('click', function(e) {
    var btn = e.target.closest('button[data-action]');
    if (!btn) return;
    var action = btn.dataset.action;
    if (action === 'edit-cat') {
      _openAddModal(btn.dataset.id);
    } else if (action === 'del-cat') {
      var delId = btn.dataset.id;
      MF.nav.showModal('<p style="color:var(--text2)">\u00bfEliminar esta categor\u00eda?</p>', 'Eliminar', [
        { label: 'Cancelar', action: MF.nav.closeModal },
        { label: 'Eliminar', danger: true, action: function() {
          var db2 = MF.db.loadData();
          db2.categories = db2.categories.filter(function(c) { return c.id !== delId; });
          MF.db.saveData(db2); MF.nav.closeModal(); render();
        }}
      ]);
    }
  });
}

function _openAddModal(id) {
  var db  = MF.db.loadData();
  var cat = id ? db.categories.find(function(c) { return c.id === id; }) : null;

  var formHTML = '<div class="form-group"><label class="form-label">Nombre</label>'
    + '<input class="form-input" id="cat-name" value="' + MF.nav.esc(cat ? cat.name : '') + '" placeholder="ej: Mascotas"></div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label class="form-label">Color</label>'
    + '<input class="form-input" id="cat-color" type="color" value="' + MF.nav.esc(cat ? cat.color : '#7aa2f7') + '" style="height:40px;padding:4px"></div>'
    + '<div class="form-group"><label class="form-label">Emoji / \u00cdcono</label>'
    + '<input class="form-input" id="cat-icon" value="' + MF.nav.esc(cat ? cat.icon : '') + '" placeholder="\uD83D\uDC36" maxlength="4"></div>'
    + '</div>';

  MF.nav.showModal(formHTML, cat ? 'Editar categor\u00eda' : 'Nueva categor\u00eda', [
    { label: 'Cancelar', action: MF.nav.closeModal },
    { label: cat ? 'Guardar' : 'Crear', primary: true, action: function() {
      var name  = ((document.getElementById('cat-name') || {}).value || '').trim();
      var color = (document.getElementById('cat-color') || {}).value;
      var icon  = ((document.getElementById('cat-icon') || {}).value || '').trim();
      if (!name) { MF.nav.toast('Nombre requerido', 'error'); return; }
      var db2 = MF.db.loadData(); var now = new Date().toISOString();
      if (id) {
        var idx = db2.categories.findIndex(function(c) { return c.id === id; });
        if (idx >= 0) db2.categories[idx] = Object.assign({}, db2.categories[idx], { name: name, color: color, icon: icon, updatedAt: now });
      } else {
        db2.categories.push({ id: MF.db.generateId(), name: name, color: color, icon: icon, isCustom: true, hidden: false });
      }
      MF.db.saveData(db2); MF.nav.closeModal(); MF.nav.toast(id ? 'Categor\u00eda actualizada' : 'Categor\u00eda creada'); render();
    }}
  ]);
}

function getCatColor(cat, db) {
  var custom = (db.categories || []).find(function(c) { return c.name === cat; });
  if (custom && custom.color) return custom.color;
  var def = DEFAULT_CATS.find(function(c) { return c.name === cat; });
  if (def && def.color) return def.color;
  return '#7aa2f7';
}

var _catAPI = { render: render, getCatColor: getCatColor };
if (typeof window !== 'undefined') { window.MF = window.MF || {}; window.MF.categorias = _catAPI; }
if (typeof module !== 'undefined' && module.exports) { module.exports = _catAPI; }

})();
(function(){
// src/modules/dashboard.js
// Vista Dashboard: métricas, health score, donut de gastos, evolución patrimonio.

const CAT_COLORS = {
  'Alimentación': '#7aa2f7', 'Transporte': '#ff9e64',
  'Entretenimiento': '#bb9af7', 'Salud': '#9ece6a',
  'Servicios': '#f7768e', 'Ropa': '#73daca',
  'Ingresos': '#9ece6a', 'Sin categoría': '#565f89'
};

// ── Instancias de Chart.js ──────────────────────────────────────────────────
let _donutChart    = null;
let _netWorthChart = null;

function _destroyCharts() {
  if (_donutChart)    { _donutChart.destroy();    _donutChart    = null; }
  if (_netWorthChart) { _netWorthChart.destroy(); _netWorthChart = null; }
}

// ── render ──────────────────────────────────────────────────────────────────

function render() {
  MF.nav.setFabAction(null); // Dashboard no agrega nada con FAB

  const db       = MF.db.loadData();
  const now      = new Date();
  const month    = now.toISOString().slice(0, 7);
  const cur      = (db.settings && db.settings.currency) || '$';

  const monthTxs = db.transactions.filter(t => t.date && t.date.startsWith(month));
  const income   = monthTxs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expenses = monthTxs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const savings  = income - expenses;
  const totalBalance = db.accounts.reduce((s, a) => s + (a.balance || 0), 0);
  const score        = MF.analytics.calcHealthScore(db);
  const netWorthData = MF.analytics.calcNetWorthEvolution(db, 6);

  const container = document.getElementById('view-dashboard');
  if (!container) return;

  _destroyCharts();

  const isMobile   = window.innerWidth < 480;
  const isLarge    = window.innerWidth >= 1024;
  const dateLabel  = now.toLocaleDateString('es', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const monthLabel = now.toLocaleDateString('es', { month: 'long' });
  const savingsColor = savings >= 0 ? 'var(--income)' : 'var(--expense)';

  const scoreLines = [
    ['Ahorro',       score.breakdown.savings, 30],
    ['Presupuestos', score.breakdown.budgets, 25],
    ['Metas',        score.breakdown.goals,   25],
    ['Tarjetas',     score.breakdown.cards,   20]
  ].map(row => {
    const pct = Math.round((row[1] / row[2]) * 100);
    return '<div class="health-score__bar-row">'
      + '<span class="health-score__bar-label">' + MF.nav.esc(row[0]) + '</span>'
      + '<div class="progress-bar" style="flex:1"><div class="progress-bar__fill" style="width:' + pct + '%;background:var(--accent)"></div></div>'
      + '<span style="min-width:24px;text-align:right;color:var(--text2)">' + row[1] + '</span>'
      + '</div>';
  }).join('');

  const viewHTML = '<div class="dash-container">'
    + '<div style="margin-bottom:8px;font-size:12px;color:var(--text3)">' + MF.nav.esc(dateLabel) + '</div>'
    + '<div class="card-grid dash-metric-grid">'
    + _metricCardHTML('Balance total',     MF.nav.formatCurrency(totalBalance, cur), '')
    + _metricCardHTML('Ingresos del mes',  MF.nav.formatCurrency(income,        cur), 'color:var(--income)')
    + _metricCardHTML('Gastos del mes',    MF.nav.formatCurrency(expenses,      cur), 'color:var(--expense)')
    + _metricCardHTML('Ahorro',            MF.nav.formatCurrency(savings,       cur), 'color:' + savingsColor)
    + '</div>'
    + '<div class="dash-charts-grid">'
    + '<div class="card">'
    + '<div class="card-header"><span class="card-title">Salud financiera</span></div>'
    + '<div class="health-score">'
    + '<div style="display:flex;align-items:baseline;gap:6px">'
    + '<div class="health-score__number">' + score.total + '</div>'
    + '<div class="health-score__label">/ 100</div>'
    + '</div>'
    + '<div class="health-score__bar">' + scoreLines + '</div>'
    + '<div class="health-score__message">' + MF.nav.esc(MF.analytics.healthScoreMessage(score.total)) + '</div>'
    + '</div></div>'
    + '<div class="card">'
    + '<div class="card-header"><span class="card-title">Gastos por categor\u00eda</span>'
    + '<span style="font-size:12px;color:var(--text3)">' + MF.nav.esc(monthLabel) + '</span></div>'
    + '<canvas id="chart-donut"></canvas>'
    + '</div>'
    + '<div class="card dash-networth-card">'
    + '<div class="card-header"><span class="card-title">Patrimonio neto \u2014 \u00faltimos 6 meses</span></div>'
    + '<canvas id="chart-networth"></canvas>'
    + '</div>'
    + '</div>'
    + '</div>';

  container.textContent = '';
  container.insertAdjacentHTML('beforeend', viewHTML);

  _renderDonut(db, monthTxs, isMobile, isLarge);
  _renderNetWorth(netWorthData, cur, isMobile, isLarge);
}

function _metricCardHTML(label, value, style) {
  return '<div class="card" style="padding:12px 14px">'
    + '<div class="card-title" style="font-size:11px">' + MF.nav.esc(label) + '</div>'
    + '<div class="card-value" style="margin-top:6px;font-size:18px;' + style + '">' + MF.nav.esc(value) + '</div>'
    + '</div>';
}

// ── Charts ──────────────────────────────────────────────────────────────────

function _textColor() {
  return getComputedStyle(document.documentElement).getPropertyValue('--text2').trim() || '#a9b1d6';
}

function _renderDonut(db, monthTxs, isMobile, isLarge) {
  const canvas = document.getElementById('chart-donut');
  if (!canvas || typeof Chart === 'undefined') return;

  const byCategory = {};
  monthTxs.filter(t => t.type === 'expense').forEach(tx => {
    const cat = tx.cat || 'Sin categoría';
    byCategory[cat] = (byCategory[cat] || 0) + tx.amount;
  });

  const maxEntries = isMobile ? 5 : 8;
  const entries   = Object.entries(byCategory).sort((a, b) => b[1] - a[1]).slice(0, maxEntries);
  const labels    = entries.map(e => e[0]);
  const data      = entries.map(e => e[1]);
  const colors    = labels.map(cat => MF.categorias.getCatColor(cat, db));
  const textColor = _textColor();
  const cur       = (db.settings && db.settings.currency) || '$';

  _donutChart = new Chart(canvas.getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{ data: data, backgroundColor: colors, borderWidth: 2, borderColor: 'var(--bg2)' }]
    },
    options: {
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: textColor,
            boxWidth: isMobile ? 8 : 10,
            padding: isMobile ? 6 : 10,
            font: { size: isMobile ? 10 : 11 }
          }
        },
        tooltip: { callbacks: { label: ctx => ' ' + MF.nav.formatCurrency(ctx.parsed, cur) } }
      },
      cutout: '60%',
      maintainAspectRatio: true,
      aspectRatio: isMobile ? 1.4 : isLarge ? 1.2 : 1.6
    }
  });
}

function _renderNetWorth(points, cur, isMobile, isLarge) {
  const canvas = document.getElementById('chart-networth');
  if (!canvas || typeof Chart === 'undefined') return;

  const textColor   = _textColor();
  const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--blue').trim() || '#7aa2f7';

  _netWorthChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: points.map(p => p.label),
      datasets: [{
        data: points.map(p => p.netWorth),
        borderColor: accentColor,
        backgroundColor: accentColor + '22',
        fill: true,
        tension: 0.4,
        pointRadius: isMobile ? 3 : 4,
        pointBackgroundColor: accentColor
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { color: textColor, font: { size: 10 }, maxRotation: 0 },
          grid: { display: false }
        },
        y: {
          ticks: {
            color: textColor,
            font: { size: 10 },
            maxTicksLimit: isMobile ? 4 : 5,
            callback: v => {
              const abs = Math.abs(v);
              if (abs >= 1000) return (v / 1000).toFixed(1) + 'k';
              return String(v);
            }
          },
          grid: { color: 'rgba(255,255,255,0.05)' }
        }
      },
      maintainAspectRatio: true,
      aspectRatio: isMobile ? 2.5 : isLarge ? 1.8 : 3.5
    }
  });
}

// ── Exports ─────────────────────────────────────────────────────────────────

const _dashboardAPI = { render };

if (typeof window !== 'undefined') {
  window.MF = window.MF || {};
  window.MF.dashboard = _dashboardAPI;
}



})();
(function(){
// src/modules/cuentas.js
// CRUD de cuentas bancarias y tarjetas de crédito.

const ACC_TYPES = { savings: 'Ahorros', checking: 'Corriente', cash: 'Efectivo', other: 'Otro' };

// ── render ──────────────────────────────────────────────────────────────────

function render() {
  MF.nav.setFabAction(_openAddTypeModal);

  const db  = MF.db.loadData();
  const cur = (db.settings && db.settings.currency) || '$';

  const totalBalance = db.accounts.reduce((s, a) => s + (a.balance || 0), 0);

  const accountsHTML = db.accounts.length
    ? db.accounts.map(a => _accountItemHTML(a, cur)).join('')
    : _emptyStateHTML('No tienes cuentas registradas');

  const cardsHTML = db.cards.length
    ? db.cards.map(c => _cardItemHTML(c, cur)).join('')
    : _emptyStateHTML('No tienes tarjetas registradas');

  const viewHTML = '<div style="max-width:700px">'
    + '<div class="card-grid" style="margin-bottom:20px">'
    + '<div class="card"><div class="card-title">Total en cuentas</div>'
    + '<div class="card-value" style="margin-top:8px;color:var(--income)">'
    + MF.nav.esc(MF.nav.formatCurrency(totalBalance, cur)) + '</div></div>'
    + '<div class="card"><div class="card-title">Deuda tarjetas</div>'
    + '<div class="card-value" style="margin-top:8px;color:var(--expense)">'
    + MF.nav.esc(MF.nav.formatCurrency(totalDebt, cur)) + '</div></div>'
    + '</div>'
    + '<div class="section-header"><h2>Cuentas</h2></div>'
    + '<div id="list-accounts">' + accountsHTML + '</div>'
    + '<div class="section-header" style="margin-top:24px"><h2>Tarjetas de cr\u00e9dito</h2></div>'
    + '<div id="list-cards">' + cardsHTML + '</div>'
    + '</div>';

  const container = document.getElementById('view-cuentas');
  if (!container) return;
  container.textContent = '';
  container.insertAdjacentHTML('beforeend', viewHTML);

  document.getElementById('list-accounts')?.addEventListener('click', e => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const id     = btn.dataset.id;
    if (action === 'edit-account')     _openAccountModal(id);
    else if (action === 'del-account') _deleteAccount(id);
  });

  document.getElementById('list-cards')?.addEventListener('click', e => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const id     = btn.dataset.id;
    if (action === 'edit-card')     _openCardModal(id);
    else if (action === 'del-card') _deleteCard(id);
  });
}

// ── Templates ────────────────────────────────────────────────────────────────

function _accountItemHTML(a, cur) {
  const bg = a.color || '#7aa2f7';
  return '<div class="list-item">'
    + '<div class="list-item__icon" style="background:' + MF.nav.esc(bg) + '">' + MF.icons.cuentas + '</div>'
    + '<div class="list-item__content">'
    + '<div class="list-item__title">' + MF.nav.esc(a.name) + '</div>'
    + '<div class="list-item__sub">' + MF.nav.esc(ACC_TYPES[a.type] || a.type) + '</div>'
    + '</div>'
    + '<div class="list-item__amount text-income">' + MF.nav.esc(MF.nav.formatCurrency(a.balance, cur)) + '</div>'
    + '<div class="list-item__actions">'
    + '<button class="btn-icon" data-action="edit-account" data-id="' + MF.nav.esc(a.id) + '" title="Editar">' + MF.icons.pencil + '</button>'
    + '<button class="btn-icon" data-action="del-account"  data-id="' + MF.nav.esc(a.id) + '" title="Eliminar">' + MF.icons.trash + '</button>'
    + '</div></div>';
}

function _cardItemHTML(c, cur) {
  const used     = ((c.balance || 0) / Math.max(c.limit || 1, 1)) * 100;
  const barClass = used > 90 ? 'progress-bar__fill--danger' : used > 70 ? 'progress-bar__fill--warning' : '';
  return '<div class="list-item" style="flex-direction:column;align-items:stretch;gap:8px">'
    + '<div style="display:flex;align-items:center;gap:12px">'
    + '<div class="list-item__icon" style="background:' + MF.nav.esc(c.color || '#bb9af7') + '">' + MF.icons.deudas + '</div>'
    + '<div class="list-item__content">'
    + '<div class="list-item__title">' + MF.nav.esc(c.name) + '</div>'
    + '<div class="list-item__sub">Cierra d\u00eda ' + MF.nav.esc(String(c.closeDay || '?')) + '</div>'
    + '</div>'
    + '<div style="text-align:right">'
    + '<div class="amount text-expense">' + MF.nav.esc(MF.nav.formatCurrency(c.balance, cur)) + '</div>'
    + '<div style="font-size:11px;color:var(--text3)">de ' + MF.nav.esc(MF.nav.formatCurrency(c.limit, cur)) + '</div>'
    + '</div>'
    + '<div class="list-item__actions" style="opacity:1">'
    + '<button class="btn-icon" data-action="edit-card" data-id="' + MF.nav.esc(c.id) + '">' + MF.icons.pencil + '</button>'
    + '<button class="btn-icon" data-action="del-card"  data-id="' + MF.nav.esc(c.id) + '">' + MF.icons.trash + '</button>'
    + '</div></div>'
    + '<div class="progress-bar"><div class="progress-bar__fill ' + MF.nav.esc(barClass) + '" style="width:' + Math.min(used, 100).toFixed(1) + '%"></div></div>'
    + '</div>';
}

function _emptyStateHTML(msg) {
  return '<div class="empty-state"><div class="empty-state__icon">' + MF.icons.cuentas + '</div>'
    + '<div class="empty-state__text">' + MF.nav.esc(msg) + '</div></div>';
}

// ── Modal: tipo ───────────────────────────────────────────────────────────────

function _openAddTypeModal() {
  MF.nav.showModal(
    '<p style="color:var(--text2)">\u00bfQu\u00e9 deseas agregar?</p>',
    'Nueva entrada',
    [
      { label: 'Cancelar', action: MF.nav.closeModal },
      { label: 'Cuenta bancaria', action: () => { MF.nav.closeModal(); _openAccountModal(); } },
      { label: 'Tarjeta de cr\u00e9dito', primary: true, action: () => { MF.nav.closeModal(); _openCardModal(); } }
    ]
  );
}

// ── Modal: cuenta ─────────────────────────────────────────────────────────────

function _openAccountModal(id) {
  const db  = MF.db.loadData();
  const acc = id ? db.accounts.find(a => a.id === id) : null;

  const typeOptions = Object.entries(ACC_TYPES).map(([k, v]) =>
    '<option value="' + MF.nav.esc(k) + '"' + (acc && acc.type === k ? ' selected' : '') + '>'
    + MF.nav.esc(v) + '</option>'
  ).join('');

  const formHTML = '<div class="form-group"><label class="form-label">Nombre</label>'
    + '<input class="form-input" id="acc-name" value="' + MF.nav.esc(acc ? acc.name : '') + '" placeholder="ej: Cuenta corriente"></div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label class="form-label">Tipo</label>'
    + '<select class="form-select" id="acc-type">' + typeOptions + '</select></div>'
    + '<div class="form-group"><label class="form-label">Saldo</label>'
    + '<input class="form-input" id="acc-balance" type="number" step="0.01" value="' + (acc ? acc.balance : 0) + '"></div>'
    + '</div>'
    + '<div class="form-group"><label class="form-label">Color</label>'
    + '<input class="form-input" id="acc-color" type="color" value="' + MF.nav.esc(acc ? acc.color : '#7aa2f7') + '" style="height:40px;padding:4px"></div>';

  MF.nav.showModal(formHTML, acc ? 'Editar cuenta' : 'Nueva cuenta', [
    { label: 'Cancelar', action: MF.nav.closeModal },
    { label: acc ? 'Guardar' : 'Crear', primary: true, action: () => _saveAccount(id) }
  ]);
}

function _saveAccount(id) {
  const name    = (document.getElementById('acc-name') || {}).value?.trim() || '';
  const type    = (document.getElementById('acc-type') || {}).value;
  const balance = parseFloat((document.getElementById('acc-balance') || {}).value) || 0;
  const color   = (document.getElementById('acc-color') || {}).value;

  if (!name) { MF.nav.toast('El nombre es requerido', 'error'); return; }

  const db  = MF.db.loadData();
  const now = new Date().toISOString();

  if (id) {
    const idx = db.accounts.findIndex(a => a.id === id);
    if (idx >= 0) db.accounts[idx] = { ...db.accounts[idx], name, type, balance, color, updatedAt: now };
  } else {
    db.accounts.push({ id: MF.db.generateId(), name, type, balance, color, createdAt: now, updatedAt: now });
  }

  MF.db.saveData(db);
  MF.nav.closeModal();
  MF.nav.toast(id ? 'Cuenta actualizada' : 'Cuenta creada');
  render();
}

function _deleteAccount(id) {
  MF.nav.showModal(
    '<p style="color:var(--text2)">\u00bfEliminar esta cuenta? Las transacciones asociadas no se eliminan.</p>',
    'Eliminar cuenta',
    [
      { label: 'Cancelar', action: MF.nav.closeModal },
      { label: 'Eliminar', danger: true, action: () => {
        const db = MF.db.loadData();
        db.accounts = db.accounts.filter(a => a.id !== id);
        MF.db.saveData(db);
        MF.nav.closeModal();
        MF.nav.toast('Cuenta eliminada');
        render();
      }}
    ]
  );
}

// ── Modal: tarjeta ────────────────────────────────────────────────────────────

function _openCardModal(id) {
  const db   = MF.db.loadData();
  const card = id ? db.cards.find(c => c.id === id) : null;

  const formHTML = '<div class="form-group"><label class="form-label">Nombre</label>'
    + '<input class="form-input" id="card-name" value="' + MF.nav.esc(card ? card.name : '') + '" placeholder="ej: Visa Platinum"></div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label class="form-label">L\u00edmite</label>'
    + '<input class="form-input" id="card-limit" type="number" step="0.01" value="' + (card ? card.limit : 0) + '"></div>'
    + '<div class="form-group"><label class="form-label">Saldo actual</label>'
    + '<input class="form-input" id="card-balance" type="number" step="0.01" value="' + (card ? card.balance : 0) + '"></div>'
    + '</div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label class="form-label">D\u00eda de cierre</label>'

(function(){
// src/modules/gastos.js

let _allTxs   = [];

};

function _catIcon(cat) { return MF.icons[CAT_ICON_KEYS[cat]] || MF.icons.gastos; }

// ── render ──────────────────────────────────────────────────────────────────

function render() {
  MF.nav.setFabAction(_openAddModal);

function _renderList() {
  const list = document.getElementById('gastos-list');

  const filtered = _allTxs.filter(tx => {
    if (_fromDate && tx.date < _fromDate) return false;
    if (_toDate   && tx.date > _toDate)   return false;
    if (_query) {
      const hay = ((tx.desc || '') + ' ' + (tx.cat || '') + ' ' + (tx.note || '')).toLowerCase();
      if (!hay.includes(_query)) return false;
    }
    return true;
  });

  if (!filtered.length) {
    list.textContent = '';

  }

  const byDate = {};
  filtered.forEach(tx => {

  const cur = (_db && _db.settings && _db.settings.currency) || '$';
  const accountNames = {};
  ((_db && _db.accounts) || []).forEach(a => { accountNames[a.id] = a.name; });

  let html = '';
  Object.entries(byDate)
    .sort((a, b) => b[0].localeCompare(a[0]))

        const noteLabel = tx.note ? ' \u00b7 <em>' + MF.nav.esc(tx.note) + '</em>' : '';
        html += '<div class="list-item">'
          + '<div class="list-item__icon" style="background:var(--bg3)">' + _catIcon(tx.cat) + '</div>'
          + '<div class="list-item__content">'
          + '<div class="list-item__title">' + MF.nav.esc(tx.desc) + '</div>'
          + '<div class="list-item__sub">' + MF.nav.esc(tx.cat || 'Sin categor\u00eda') + accName + noteLabel + '</div>'
          + '</div>'

          + '</div></div>';
      });
    });

  list.textContent = '';
  list.insertAdjacentHTML('beforeend', html);

  if (isoDate === yesterday) return 'Ayer';
