// Presupuestos mensuales con barra de progreso y rollover acumulativo.

function render() {
  MF.nav.setFabAction(_openAddModal);

  const db  = MF.db.loadData();
  const cur = (db.settings && db.settings.currency) || '$';

  const now      = new Date();
  const month    = now.toISOString().slice(0, 7);
  const monthTxs = db.transactions.filter(t => t.date && t.date.startsWith(month) && t.type === 'expense');

  const spentByCat = {};
  monthTxs.forEach(tx => {
    const cat = tx.cat || '';
    spentByCat[cat] = (spentByCat[cat] || 0) + tx.amount;
  });

  const container = document.getElementById('view-presupuestos');
  if (!container) return;

  if (!db.budgets.length) {
    container.textContent = '';
    container.insertAdjacentHTML('beforeend',
      '<div class="empty-state"><div class="empty-state__icon">' + MF.icons.presupuestos + '</div>'
      + '<div class="empty-state__text">Sin presupuestos. Crea uno con el bot\u00f3n +</div></div>');
    return;
  }

  const rolloverEnabled = (db.settings && db.settings.budgetRollover) || false;
  const monthLabel = now.toLocaleDateString('es', { month: 'long', year: 'numeric' });

  const budgetCardsHTML = db.budgets.map(b =>
    _budgetCardHTML(b, spentByCat[b.cat] || 0, rolloverEnabled, cur)
  ).join('');

  const viewHTML = '<div style="max-width:700px">'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">'
    + '<h2 style="flex:1">Presupuestos \u2014 ' + MF.nav.esc(monthLabel) + '</h2>'
    + '<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)">Rollover'
    + '<label class="toggle"><input type="checkbox" id="toggle-rollover"' + (rolloverEnabled ? ' checked' : '') + '>'
    + '<span class="toggle-slider"></span></label></label>'
    + '</div>'
    + '<div id="budgets-list">' + budgetCardsHTML + '</div>'
    + '</div>';

  container.textContent = '';
  container.insertAdjacentHTML('beforeend', viewHTML);

  document.getElementById('toggle-rollover').addEventListener('change', e => {
    const db2 = MF.db.loadData();
    db2.settings.budgetRollover = e.target.checked;
    MF.db.saveData(db2);
    render();
  });

  document.getElementById('budgets-list')?.addEventListener('click', e => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const id     = btn.dataset.id;
    if (action === 'edit-budget') _openAddModal(id);
    else if (action === 'del-budget') _deleteBudget(id);
  });
}

function _budgetCardHTML(b, spent, rolloverEnabled, cur) {
  const rollover       = rolloverEnabled ? (b.rollover || 0) : 0;
  const effectiveLimit = (b.limit || 0) + rollover;
  const pct            = effectiveLimit > 0 ? Math.min((spent / effectiveLimit) * 100, 100) : 0;
  const remaining      = effectiveLimit - spent;
  const overBudget     = spent > effectiveLimit;
  const barClass       = overBudget ? 'progress-bar__fill--danger' : pct > 80 ? 'progress-bar__fill--warning' : '';
  const color          = b.color || '#7aa2f7';

  const rolloverLabel = (rolloverEnabled && rollover > 0)
    ? '<span style="font-size:11px;color:var(--text3)">+ ' + MF.nav.esc(MF.nav.formatCurrency(rollover, cur)) + ' rollover</span>'
    : '';

  const statusLabel = overBudget
    ? 'Excedido'
    : 'Disponible: ' + MF.nav.formatCurrency(remaining, cur);

  return '<div class="card" style="margin-bottom:12px">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
    + '<div class="color-dot" style="background:' + MF.nav.esc(color) + ';width:12px;height:12px"></div>'
    + '<div style="flex:1"><div style="font-weight:500">' + MF.nav.esc(b.cat) + '</div>' + rolloverLabel + '</div>'
    + '<div style="text-align:right">'
    + '<span class="amount' + (overBudget ? ' text-expense' : '') + '">' + MF.nav.esc(MF.nav.formatCurrency(spent, cur)) + '</span>'
    + '<span style="color:var(--text3)"> / ' + MF.nav.esc(MF.nav.formatCurrency(effectiveLimit, cur)) + '</span>'
    + '</div>'
    + '<div class="list-item__actions" style="opacity:1">'
    + '<button class="btn-icon" data-action="edit-budget" data-id="' + MF.nav.esc(b.id) + '">' + MF.icons.pencil + '</button>'
    + '<button class="btn-icon" data-action="del-budget"  data-id="' + MF.nav.esc(b.id) + '">' + MF.icons.trash + '</button>'
    + '</div></div>'
    + '<div class="progress-bar"><div class="progress-bar__fill ' + MF.nav.esc(barClass) + '" style="width:' + pct.toFixed(1) + '%;background:' + MF.nav.esc(color) + '"></div></div>'
    + '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--text3)">'
    + '<span>' + MF.nav.esc(statusLabel) + '</span>'
    + '<span>' + pct.toFixed(0) + '%</span>'
    + '</div></div>';
}

function _openAddModal(id) {
  const db     = MF.db.loadData();
  const budget = id ? db.budgets.find(b => b.id === id) : null;

  const defaultCats = ['Alimentación','Transporte','Entretenimiento','Salud','Servicios','Ropa','Hogar','Educación','Otro'];
  const customCats  = (db.categories || []).filter(c => !c.hidden).map(c => c.name);
  const allCats     = defaultCats.concat(customCats.filter(c => !defaultCats.includes(c)));
  const catOptions  = allCats.map(c =>
    '<option value="' + MF.nav.esc(c) + '"' + (budget && budget.cat === c ? ' selected' : '') + '>' + MF.nav.esc(c) + '</option>'
  ).join('');

  const formHTML = '<div class="form-group"><label class="form-label">Categor\u00eda</label>'
    + '<select class="form-select" id="budget-cat">' + catOptions + '</select></div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label class="form-label">L\u00edmite mensual</label>'
    + '<input class="form-input" id="budget-limit" type="number" step="0.01" min="0" value="' + (budget ? budget.limit : '') + '"></div>'
    + '<div class="form-group"><label class="form-label">Color</label>'
    + '<input class="form-input" id="budget-color" type="color" value="' + MF.nav.esc(budget ? budget.color : '#7aa2f7') + '" style="height:40px;padding:4px"></div>'
    + '</div>';

  MF.nav.showModal(formHTML, budget ? 'Editar presupuesto' : 'Nuevo presupuesto', [
    { label: 'Cancelar', action: MF.nav.closeModal },
    { label: budget ? 'Guardar' : 'Crear', primary: true, action: () => _saveBudget(id) }
  ]);
}

function _saveBudget(id) {
  const cat   = (document.getElementById('budget-cat') || {}).value;
  const limit = parseFloat((document.getElementById('budget-limit') || {}).value);
  const color = (document.getElementById('budget-color') || {}).value;

  if (!cat)               { MF.nav.toast('Selecciona una categor\u00eda', 'error'); return; }
  if (!limit || limit <= 0) { MF.nav.toast('L\u00edmite inv\u00e1lido', 'error'); return; }

  const db  = MF.db.loadData();
  const now = new Date().toISOString();

  if (id) {
    const idx = db.budgets.findIndex(b => b.id === id);
    if (idx >= 0) db.budgets[idx] = { ...db.budgets[idx], cat, limit, color, updatedAt: now };
  } else {
    if (db.budgets.some(b => b.cat === cat)) {
      MF.nav.toast('Ya existe un presupuesto para esa categor\u00eda', 'error');
      return;
    }
    db.budgets.push({ id: MF.db.generateId(), cat, limit, color, rollover: 0, createdAt: now, updatedAt: now });
  }

  MF.db.saveData(db);
  MF.nav.closeModal();
  MF.nav.toast(id ? 'Presupuesto actualizado' : 'Presupuesto creado');
  render();
}

function _deleteBudget(id) {
  MF.nav.showModal(
    '<p style="color:var(--text2)">\u00bfEliminar este presupuesto?</p>',
    'Eliminar presupuesto',
    [
      { label: 'Cancelar', action: MF.nav.closeModal },
      { label: 'Eliminar', danger: true, action: () => {
        const db = MF.db.loadData();
        db.budgets = db.budgets.filter(b => b.id !== id);
        MF.db.saveData(db);
        MF.nav.closeModal();
        MF.nav.toast('Presupuesto eliminado');
        render();
      }}
    ]
  );
}

// ── Exports ─────────────────────────────────────────────────────────────────

const _presupuestosAPI = { render };

if (typeof window !== 'undefined') {
  window.MF = window.MF || {};
  window.MF.presupuestos = _presupuestosAPI;
}

  var cur = (db.settings && db.settings.currency) || '$';

  var avgSavings = MF.analytics.calcMonthlyAvgSavings(db, 3);

  var container = document.getElementById('view-metas');
  if (!container) return;

  if (!db.goals.length) {
    container.textContent = '';
    container.insertAdjacentHTML('beforeend',
      '<div class="empty-state"><div class="empty-state__icon">' + MF.icons.metas + '</div>'
      + '<div class="empty-state__text">Sin metas. Crea una con el bot\u00f3n +</div></div>');
    return;
  }

  var cardsHTML = db.goals.map(function(g) { return _goalCardHTML(g, avgSavings, cur); }).join('');

  var viewHTML = '<div style="max-width:700px">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">'
    + '<h2>Metas de ahorro</h2>'
    + (avgSavings > 0
      ? '<span style="font-size:12px;color:var(--text3)">Ahorro prom.: ' + MF.nav.esc(MF.nav.formatCurrency(avgSavings, cur)) + '/mes</span>'
      : '')
    + '</div>'
    + '<div id="metas-list">' + cardsHTML + '</div>'
    + '</div>';

  container.textContent = '';
  container.insertAdjacentHTML('beforeend', viewHTML);

  document.getElementById('metas-list')?.addEventListener('click', function(e) {
    var btn = e.target.closest('button[data-action]');
    if (!btn) return;
    if (btn.dataset.action === 'edit-goal') _openAddModal(btn.dataset.id);
    else if (btn.dataset.action === 'del-goal') _deleteGoal(btn.dataset.id);
    else if (btn.dataset.action === 'add-savings') _openAddSavingsModal(btn.dataset.id);
  });
}

function _goalCardHTML(g, avgSavings, cur) {
  var pct       = Math.min(((g.saved || 0) / Math.max(g.target || 1, 1)) * 100, 100);
  var remaining = Math.max((g.target || 0) - (g.saved || 0), 0);
  var months    = MF.analytics.projectGoal(g, avgSavings);
  var color     = g.color || '#7aa2f7';

  var projLabel = '';
  if (pct >= 100) {
    projLabel = '<span style="color:var(--income)">' + MF.icons.check + ' Meta alcanzada</span>';
  } else if (months !== null && months > 0) {
    projLabel = '<span style="color:var(--text3)">~' + months + ' mes' + (months !== 1 ? 'es' : '') + ' a este ritmo</span>';
  } else if (avgSavings <= 0) {
    projLabel = '<span style="color:var(--text3)">Agrega ahorros para proyectar</span>';
  }

  var deadlineLabel = g.deadline
    ? '<span style="font-size:11px;color:var(--text3)">Meta: ' + MF.nav.esc(MF.nav.formatDate(g.deadline)) + '</span>'
    : '';

  return '<div class="card" style="margin-bottom:12px">'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'
    + '<div style="width:40px;height:40px;border-radius:50%;background:' + MF.nav.esc(color) + ';display:flex;align-items:center;justify-content:center">' + MF.icons.metas + '</div>'
    + '<div style="flex:1">'
    + '<div style="font-weight:500">' + MF.nav.esc(g.name) + '</div>'
    + deadlineLabel
    + '</div>'
    + '<div style="text-align:right">'
    + '<div class="amount">' + MF.nav.esc(MF.nav.formatCurrency(g.saved, cur)) + '</div>'
    + '<div style="font-size:11px;color:var(--text3)">de ' + MF.nav.esc(MF.nav.formatCurrency(g.target, cur)) + '</div>'
    + '</div>'
    + '<div class="list-item__actions" style="opacity:1">'
    + '<button class="btn-icon" data-action="add-savings" data-id="' + MF.nav.esc(g.id) + '" title="Agregar ahorro">' + MF.icons.plus + '</button>'
    + '<button class="btn-icon" data-action="edit-goal"   data-id="' + MF.nav.esc(g.id) + '" title="Editar">' + MF.icons.pencil + '</button>'
    + '<button class="btn-icon" data-action="del-goal"    data-id="' + MF.nav.esc(g.id) + '" title="Eliminar">' + MF.icons.trash + '</button>'
    + '</div></div>'
    + '<div class="progress-bar" style="height:8px">'
    + '<div class="progress-bar__fill" style="width:' + pct.toFixed(1) + '%;background:' + MF.nav.esc(color) + '"></div>'
    + '</div>'
    + '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px">'
    + '<div>' + projLabel + '</div>'
    + '<span style="color:var(--text3)">' + pct.toFixed(0) + '%</span>'
    + '</div></div>';
}

function _openAddModal(id) {
  var db   = MF.db.loadData();
  var goal = id ? db.goals.find(function(g) { return g.id === id; }) : null;
  var today = new Date().toISOString().slice(0, 10);

  var formHTML = '<div class="form-group"><label class="form-label">Nombre</label>'
    + '<input class="form-input" id="goal-name" value="' + MF.nav.esc(goal ? goal.name : '') + '" placeholder="ej: Fondo de emergencia"></div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label class="form-label">Meta ($)</label>'
    + '<input class="form-input" id="goal-target" type="number" step="0.01" min="0" value="' + (goal ? goal.target : '') + '"></div>'
    + '<div class="form-group"><label class="form-label">Ahorrado ($)</label>'
    + '<input class="form-input" id="goal-saved" type="number" step="0.01" min="0" value="' + (goal ? goal.saved : 0) + '"></div>'
    + '</div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label class="form-label">Fecha l\u00edmite</label>'
    + '<input class="form-input" id="goal-deadline" type="date" value="' + MF.nav.esc(goal && goal.deadline ? goal.deadline : today) + '"></div>'
    + '<div class="form-group"><label class="form-label">Color</label>'
    + '<input class="form-input" id="goal-color" type="color" value="' + MF.nav.esc(goal ? goal.color : '#9ece6a') + '" style="height:40px;padding:4px"></div>'
    + '</div>';

  MF.nav.showModal(formHTML, goal ? 'Editar meta' : 'Nueva meta', [
    { label: 'Cancelar', action: MF.nav.closeModal },
    { label: goal ? 'Guardar' : 'Crear', primary: true, action: function() { _saveGoal(id); } }
  ]);
}

function _openAddSavingsModal(id) {
  var db   = MF.db.loadData();
  var goal = db.goals.find(function(g) { return g.id === id; });
  if (!goal) return;

  var formHTML = '<p style="color:var(--text2);margin-bottom:12px">Meta: <strong>' + MF.nav.esc(goal.name) + '</strong></p>'
    + '<div class="form-group"><label class="form-label">Monto a agregar</label>'
    + '<input class="form-input" id="savings-amount" type="number" step="0.01" min="0.01" placeholder="0.00"></div>';

  MF.nav.showModal(formHTML, 'Agregar ahorro', [
    { label: 'Cancelar', action: MF.nav.closeModal },
    { label: 'Agregar', primary: true, action: function() {
      var amount = parseFloat((document.getElementById('savings-amount') || {}).value);
      if (!amount || amount <= 0) { MF.nav.toast('Monto inv\u00e1lido', 'error'); return; }
      var db2  = MF.db.loadData();
      var idx  = db2.goals.findIndex(function(g) { return g.id === id; });
      if (idx >= 0) db2.goals[idx].saved = (db2.goals[idx].saved || 0) + amount;
      MF.db.saveData(db2);
      MF.nav.closeModal();
      MF.nav.toast('Ahorro registrado');
      render();
    }}
  ]);
}

function _saveGoal(id) {
  var name     = ((document.getElementById('goal-name') || {}).value || '').trim();
  var target   = parseFloat((document.getElementById('goal-target') || {}).value);
  var saved    = parseFloat((document.getElementById('goal-saved') || {}).value) || 0;
  var deadline = (document.getElementById('goal-deadline') || {}).value;
  var color    = (document.getElementById('goal-color') || {}).value;

  if (!name)              { MF.nav.toast('Nombre requerido', 'error'); return; }
  if (!target || target <= 0) { MF.nav.toast('Meta inv\u00e1lida', 'error'); return; }

  var db  = MF.db.loadData();
  var now = new Date().toISOString();

  if (id) {
    var idx = db.goals.findIndex(function(g) { return g.id === id; });
    if (idx >= 0) db.goals[idx] = Object.assign({}, db.goals[idx], { name: name, target: target, saved: saved, deadline: deadline, color: color, updatedAt: now });
  } else {
    db.goals.push({ id: MF.db.generateId(), name: name, target: target, saved: saved, deadline: deadline, color: color, createdAt: now, updatedAt: now });
  }

  MF.db.saveData(db);
  MF.nav.closeModal();
  MF.nav.toast(id ? 'Meta actualizada' : 'Meta creada');
  render();
}

function _deleteGoal(id) {
  MF.nav.showModal('<p style="color:var(--text2)">\u00bfEliminar esta meta?</p>', 'Eliminar meta', [
    { label: 'Cancelar', action: MF.nav.closeModal },
    { label: 'Eliminar', danger: true, action: function() {
      var db = MF.db.loadData();
      db.goals = db.goals.filter(function(g) { return g.id !== id; });
      MF.db.saveData(db);
      MF.nav.closeModal();
      MF.nav.toast('Meta eliminada');
      render();
    }}
  ]);
}

var _metasAPI = { render: render };
if (typeof window !== 'undefined') { window.MF = window.MF || {}; window.MF.metas = _metasAPI; }
if (typeof module !== 'undefined' && module.exports) { module.exports = _metasAPI; }

})();
(function(){

function _debtCardHTML(d, cur) {
  var pct      = d.total > 0 ? Math.min(((d.total - d.remaining) / d.total) * 100, 100) : 0;
  var months   = MF.analytics.projectDebt(d);
  var color    = d.color || '#f7768e';
  var typeLabel = d.type === 'credit' ? 'Tarjeta' : 'Pr\u00e9stamo';

  var projLabel = '';

    projLabel = '<span style="color:var(--warning)">Pago insuficiente para cubrir intereses</span>';
  }

  return '<div class="card" style="margin-bottom:12px">'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'

    + '<button class="btn-icon" data-action="edit-debt" data-id="' + MF.nav.esc(d.id) + '" title="Editar">' + MF.icons.pencil + '</button>'
    + '<button class="btn-icon" data-action="del-debt"  data-id="' + MF.nav.esc(d.id) + '" title="Eliminar">' + MF.icons.trash + '</button>'
    + '</div></div>'
    + '<div class="progress-bar" style="height:8px">'
    + '<div class="progress-bar__fill" style="width:' + pct.toFixed(1) + '%;background:' + MF.nav.esc(color) + '"></div>'
    + '</div>'
    + '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px">'
    + '<div>' + projLabel + '</div>'
    + '<span style="color:var(--text3)">Pago mensual: ' + MF.nav.esc(MF.nav.formatCurrency(d.monthly, cur)) + '</span>'
    + '</div></div>';
}

function _openSimulatorModal(id) {
  var db   = MF.db.loadData();
  var debt = db.debts.find(function(d) { return d.id === id; });
  if (!debt) return;

  var cur         = (db.settings && db.settings.currency) || '$';
  var baseMonths  = MF.analytics.projectDebt(debt);

  var formHTML = '<p style="color:var(--text2);margin-bottom:12px">Deuda: <strong>' + MF.nav.esc(debt.name) + '</strong></p>'
    + '<p style="font-size:13px;color:var(--text3);margin-bottom:12px">Meses actuales: <strong>' + (baseMonths !== null ? baseMonths : 'N/A') + '</strong></p>'
    + '<div class="form-group"><label class="form-label">Pago extra mensual</label>'
    + '<input class="form-input" id="sim-extra" type="number" step="0.01" min="0" placeholder="0.00"></div>'
    + '<div id="sim-result" style="margin-top:12px;font-size:14px;color:var(--text2)"></div>';

  MF.nav.showModal(formHTML, 'Simular pago extra', [
    { label: 'Cerrar', action: MF.nav.closeModal }
  ]);

  document.getElementById('sim-extra')?.addEventListener('input', function(e) {
    var extra   = parseFloat(e.target.value) || 0;
    var simDebt = Object.assign({}, debt, { monthly: (debt.monthly || 0) + extra });
    var months  = MF.analytics.projectDebt(simDebt);
    var result  = document.getElementById('sim-result');
    if (!result) return;

    if (months === null) {
      result.textContent = '';
      result.insertAdjacentHTML('beforeend', '<span style="color:var(--warning)">El pago a\u00fan no cubre los intereses.</span>');
    } else if (baseMonths !== null && months < baseMonths) {
      var saved = baseMonths - months;
      result.textContent = '';
      result.insertAdjacentHTML('beforeend',

      result.textContent = months !== null ? months + ' meses' : '';
    }
  });
}

function _openPaymentModal(id) {
  var db   = MF.db.loadData();

  var cur     = (db.settings && db.settings.currency) || '$';

(function(){
// src/modules/reporte.js
// Reporte mensual: resumen + tendencias por categoría + evolución patrimonio.

var _trendsChart   = null;
var _networthChart = null;

function render() {
  MF.nav.setFabAction(null);

  var db  = MF.db.loadData();
  var cur = (db.settings && db.settings.currency) || '$';
  var now = new Date();
  var month = now.toISOString().slice(0, 7);
  var monthLabel = now.toLocaleDateString('es', { month: 'long', year: 'numeric' });

  var monthTxs = db.transactions.filter(function(t) { return t.date && t.date.startsWith(month); });
  var income   = monthTxs.filter(function(t) { return t.type === 'income'; }).reduce(function(s, t) { return s + t.amount; }, 0);
  var expenses = monthTxs.filter(function(t) { return t.type === 'expense'; }).reduce(function(s, t) { return s + t.amount; }, 0);
  var savings  = income - expenses;

  var trends    = MF.analytics.calcSpendingTrends(db, 6);
  var netWorth  = MF.analytics.calcNetWorthEvolution(db, 6);

  var byCat = {};
  monthTxs.filter(function(t) { return t.type === 'expense'; }).forEach(function(t) {
    var cat = t.cat || 'Sin categor\u00eda';
    byCat[cat] = (byCat[cat] || 0) + t.amount;
  });
  var topCats = Object.entries(byCat).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);

  var topCatsHTML = topCats.map(function(entry) {
    var pct = expenses > 0 ? ((entry[1] / expenses) * 100).toFixed(1) : '0';
    var color = MF.categorias.getCatColor(entry[0], db);
    return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      + '<div style="width:10px;height:10px;border-radius:50%;background:' + MF.nav.esc(color) + '"></div>'
      + '<span style="flex:1">' + MF.nav.esc(entry[0]) + '</span>'
      + '<span class="amount">' + MF.nav.esc(MF.nav.formatCurrency(entry[1], cur)) + '</span>'
      + '<span style="color:var(--text3);width:36px;text-align:right">' + MF.nav.esc(pct) + '%</span>'
      + '</div>';
  }).join('');

  var container = document.getElementById('view-reporte');
  if (!container) return;

  if (_trendsChart)   { _trendsChart.destroy();   _trendsChart   = null; }
  if (_networthChart) { _networthChart.destroy(); _networthChart = null; }

  var viewHTML = '<div style="max-width:900px">'
    + '<h2 style="margin-bottom:16px">Reporte \u2014 ' + MF.nav.esc(monthLabel) + '</h2>'
    + '<div class="card-grid" style="margin-bottom:20px">'
    + _metricHTML('Ingresos', MF.nav.formatCurrency(income, cur), 'color:var(--income)')
    + _metricHTML('Gastos',   MF.nav.formatCurrency(expenses, cur), 'color:var(--expense)')
    + _metricHTML('Ahorro',   MF.nav.formatCurrency(savings, cur),  savings >= 0 ? 'color:var(--income)' : 'color:var(--expense)')
    + (function() { var lnw = netWorth.length > 0 ? netWorth[netWorth.length - 1].netWorth : 0; return _metricHTML('Patrimonio', MF.nav.formatCurrency(lnw, cur), lnw >= 0 ? 'color:var(--income)' : 'color:var(--expense)'); })()
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">'
    + '<div class="card"><div class="card-header"><span class="card-title">Top categor\u00edas del mes</span></div>'
    + (topCatsHTML || '<p style="color:var(--text3);font-size:13px">Sin gastos este mes.</p>') + '</div>'
    + '<div class="card"><div class="card-header"><span class="card-title">Patrimonio neto \u2014 6 meses</span></div>'
    + '<canvas id="chart-rpt-networth" style="max-height:160px"></canvas></div>'
    + '</div>'
    + '<div class="card"><div class="card-header"><span class="card-title">Tendencia de gastos por categor\u00eda \u2014 6 meses</span></div>'
    + '<canvas id="chart-rpt-trends" style="max-height:200px"></canvas></div>'
    + '</div>';

  container.textContent = '';
  container.insertAdjacentHTML('beforeend', viewHTML);

  _renderTrends(trends, db);
  _renderNetworth(netWorth, cur);
}

function _metricHTML(label, value, style) {
  return '<div class="card">'
    + '<div class="card-title">' + MF.nav.esc(label) + '</div>'
    + '<div class="card-value" style="margin-top:8px;font-size:18px;' + style + '">' + MF.nav.esc(value) + '</div>'
    + '</div>';
}

function _textColor() {
  return getComputedStyle(document.documentElement).getPropertyValue('--text2').trim() || '#a9b1d6';
}

function _renderTrends(trends, db) {
  var canvas = document.getElementById('chart-rpt-trends');
  if (!canvas || typeof Chart === 'undefined') return;

  var totalByCat = {};
  trends.forEach(function(point) {
    Object.entries(point.byCategory).forEach(function(e) {
      totalByCat[e[0]] = (totalByCat[e[0]] || 0) + e[1];
    });
  });
  var topCats = Object.entries(totalByCat).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 4).map(function(e) { return e[0]; });

  var CHART_COLORS = ['#7aa2f7','#bb9af7','#ff9e64','#f7768e'];
  var textColor = _textColor();

  var datasets = topCats.map(function(cat, i) {
    return {
      label: cat,
      data: trends.map(function(p) { return p.byCategory[cat] || 0; }),
      borderColor: CHART_COLORS[i % CHART_COLORS.length],
      backgroundColor: CHART_COLORS[i % CHART_COLORS.length] + '22',
      tension: 0.3,
      fill: false,
      pointRadius: 3
    };
  });

  _trendsChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: { labels: trends.map(function(p) { return p.label; }), datasets: datasets },
    options: {
      plugins: { legend: { position: 'bottom', labels: { color: textColor, boxWidth: 10, padding: 8, font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: textColor, font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
      },
      maintainAspectRatio: true
    }
  });
}

function _renderNetworth(points, cur) {
  var canvas = document.getElementById('chart-rpt-networth');
  if (!canvas || typeof Chart === 'undefined') return;
  var textColor   = _textColor();
  var accentColor = getComputedStyle(document.documentElement).getPropertyValue('--blue').trim() || '#7aa2f7';

  _networthChart = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: points.map(function(p) { return p.label; }),
      datasets: [{
        data: points.map(function(p) { return p.netWorth; }),
        borderColor: accentColor, backgroundColor: accentColor + '22',
        fill: true, tension: 0.4, pointRadius: 4
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: textColor, font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: textColor, font: { size: 10 }, callback: function(v) { return MF.nav.formatCurrency(v, cur); } }, grid: { color: 'rgba(255,255,255,0.05)' } }
      },
      maintainAspectRatio: true
    }
  });
}

var _reporteAPI = { render: render };
if (typeof window !== 'undefined') { window.MF = window.MF || {}; window.MF.reporte = _reporteAPI; }
if (typeof module !== 'undefined' && module.exports) { module.exports = _reporteAPI; }

})();

// Tablas ISR vigentes desde mayo 2025
var _ISR_MENSUAL = [
  { max: 550.00,   cuota:   0.00, tasa: 0.00, exceso:    0.00 },
  { max: 895.24,   cuota:  17.67, tasa: 0.10, exceso:  550.00 },
  { max: 2038.10,  cuota:  60.00, tasa: 0.20, exceso:  895.24 },
  { max: Infinity, cuota: 288.57, tasa: 0.30, exceso: 2038.10 }
];

var _ISR_QUINCENAL = [
  { max: 275.00,   cuota:   0.00, tasa: 0.00, exceso:    0.00 },
  { max: 447.62,   cuota:   8.83, tasa: 0.10, exceso:  275.00 },
  { max: 1019.05,  cuota:  30.00, tasa: 0.20, exceso:  447.62 },
  { max: Infinity, cuota: 144.28, tasa: 0.30, exceso: 1019.05 }
];

function _calcISR(renta, frecuencia) {
  var tabla = frecuencia === 'quincenal' ? _ISR_QUINCENAL : _ISR_MENSUAL;
  if (renta <= 0) return 0;
  for (var i = 0; i < tabla.length; i++) {
    if (renta <= tabla[i].max) {
      return tabla[i].cuota + (renta - tabla[i].exceso) * tabla[i].tasa;
    }
  }
  return 0;
}

function _calcRelacion(bruto, frecuencia, insaforp) {
  bruto = bruto || 0;
  var isssEmp = Math.min(bruto, 1000) * 0.03;
  var afpEmp  = Math.min(bruto, 7045.06) * 0.0725;
  var renta   = Math.max(0, bruto - isssEmp - afpEmp);
  var isr     = _calcISR(renta, frecuencia);
  var neto    = bruto - isssEmp - afpEmp - isr;
  var isssPat = Math.min(bruto, 1000) * 0.075;
  var afpPat  = bruto * 0.0875;
  var ins     = insaforp ? bruto * 0.01 : 0;
  var costo   = bruto + isssPat + afpPat + ins;
  return {
    isssEmp: isssEmp, afpEmp: afpEmp, isr: isr, neto: neto,
    isssPat: isssPat, afpPat: afpPat, ins: ins, costo: costo
  };
}

function _calcPrestador(monto, iva) {
  monto = monto || 0;
  var ivaAmt    = iva ? monto * 0.13 : 0;
  var factura   = monto + ivaAmt;

  return { ivaAmt: ivaAmt, factura: factura, retencion: retencion, neto: neto };

    + '</div></div>'
    + '</div>';

  var container = document.getElementById('view-configuracion');
  if (!container) return;
  container.textContent = '';
  container.insertAdjacentHTML('beforeend', viewHTML);

  document.getElementById('btn-toggle-theme')?.addEventListener('click', MF.nav.toggleTheme);

  document.getElementById('toggle-reminder')?.addEventListener('change', function(e) {
    var db2 = MF.db.loadData();
    db2.settings.reminderEnabled = e.target.checked;
    MF.db.saveData(db2);
  });

  document.getElementById('reminder-time')?.addEventListener('change', function(e) {
    var db2 = MF.db.loadData();
    db2.settings.reminderTime = e.target.value;
    MF.db.saveData(db2);
  });

  document.getElementById('btn-request-notif')?.addEventListener('click', function() {
    if (window.MF && window.MF.pwa) {
      window.MF.pwa.requestNotificationPermission().then(function(result) {
        MF.nav.toast(result === 'granted' ? 'Permiso concedido' : 'Permiso no concedido', result === 'granted' ? 'success' : 'error');
        render();
      });
    }
  });

  document.getElementById('btn-save-currency')?.addEventListener('click', function() {
    var val = ((document.getElementById('currency-input') || {}).value || '').trim();
    if (!val) return;
    var db2 = MF.db.loadData();
    db2.settings.currency = val;
    MF.db.saveData(db2);
    MF.nav.toast('Moneda guardada');
    render();
  });

  document.getElementById('btn-load-demo')?.addEventListener('click', function() {
    var db2 = MF.db.loadData();
    var hasDdata = db2.transactions.length > 0 || db2.accounts.length > 0;
    if (hasDdata) {
      MF.nav.showModal(
        '<p style="color:var(--text2)">Esto agregar\u00e1 datos de ejemplo a tu DB actual. \u00bfContinuar?</p>',
        'Cargar datos demo',
        [
          { label: 'Cancelar', action: MF.nav.closeModal },
          { label: 'Cargar demo', primary: true, action: function() {
            MF.db.generateDemoData();
            MF.nav.closeModal();
            MF.nav.toast('Datos de prueba cargados');
            render();
          }}
        ]
      );
    } else {
      MF.db.generateDemoData();
      MF.nav.toast('Datos de prueba cargados');
      render();
    }
  });

  document.getElementById('btn-export-json')?.addEventListener('click', function() {
    MF.sync.exportJSON();
    MF.nav.toast('Backup exportado');
  });

  document.getElementById('btn-export-csv')?.addEventListener('click', function() {
    MF.sync.exportCSV();
    MF.nav.toast('CSV exportado');
  });

  document.getElementById('btn-import-json')?.addEventListener('click', function() {
    MF.sync.importIncremental();
  });

  document.getElementById('reset-confirm')?.addEventListener('input', function(e) {
    var btn = document.getElementById('btn-reset');
    if (btn) btn.disabled = e.target.value !== 'BORRAR';
  });

  document.getElementById('btn-reset')?.addEventListener('click', function() {
    MF.nav.showModal(
      '<p style="color:var(--expense);display:flex;align-items:center;gap:6px">' + MF.icons.warning + '<strong> Esta acci\u00f3n es irreversible.</strong></p>'
      + '<p style="color:var(--text2);margin-top:8px">Se borrar\u00e1n todas las cuentas, transacciones, presupuestos y dem\u00e1s datos.</p>',
      'Borrar todos los datos',
      [
        { label: 'Cancelar', action: MF.nav.closeModal },
        { label: 'S\u00ed, borrar todo', danger: true, action: function() {
          MF.db.clearData();
          MF.nav.closeModal();
          MF.nav.toast('Datos eliminados. La app comienza desde cero.');
          MF.nav.go('dashboard');
        }}
      ]
    );
  });
}

var _configAPI = { render: render };
if (typeof window !== 'undefined') { window.MF = window.MF || {}; window.MF.configuracion = _configAPI; }
if (typeof module !== 'undefined' && module.exports) { module.exports = _configAPI; }

})();
MF.pwa.init();
MF.nav.init();
</script>
</body>
</html>
